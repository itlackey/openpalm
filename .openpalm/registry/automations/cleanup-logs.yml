# cleanup-logs.yml — Core automation: trim old audit log entries
#
# Runs every Sunday at 4 AM UTC. Keeps only the last 10,000 lines of each
# audit log file to prevent unbounded disk growth.
#
# This is a shipped catalog automation. To activate or customize it, copy this
# file to ~/.openpalm/config/automations/cleanup-logs.yml and edit there.
# Registry copies stay inactive until installed into config/automations/.

name: Cleanup Logs
description: Trim old audit log entries to prevent unbounded disk growth
schedule: weekly-sunday-4am
enabled: true

action:
  type: shell
  command:
    - /bin/bash
    - -c
    - |
      LOGS_DIR="${OP_HOME:?OP_HOME is required}/logs"
      for f in "$LOGS_DIR"/*.jsonl "$LOGS_DIR"/*.log; do
        [ -f "$f" ] || continue
        tail -n 10000 "$f" > "$f.tmp" && mv "$f.tmp" "$f"
      done
  timeout: 30000

on_failure: log
