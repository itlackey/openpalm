# update-containers.yml — Upgrade stack: download assets, pull images, restart
#
# Runs every Sunday at 3 AM. Keeps your stack up to date automatically.
#
# To use: copy this file to ~/.openpalm/config/automations/update-containers.yml

name: Upgrade Stack
description: Download latest assets, pull images, and restart services weekly
schedule: weekly-sunday-3am
enabled: true

action:
  type: api
  method: POST
  path: /admin/upgrade
  timeout: 300000

on_failure: log
