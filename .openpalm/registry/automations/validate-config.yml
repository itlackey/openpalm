# validate-config.yml — Core automation: periodic environment validation
#
# Runs every day at 3 AM UTC. Calls the admin validation API to check
# vault/user/user.env against the schema. Failures are logged to
# the audit trail but never block services.
#
# This is a shipped catalog automation. To activate or customize it, copy this
# file to ~/.openpalm/config/automations/validate-config.yml and edit there.
# Registry copies stay inactive until installed into config/automations/.

name: Validate Configuration
description: Periodic check of environment configuration against the schema
schedule: "0 3 * * *"
enabled: true

action:
  type: api
  method: GET
  path: /admin/config/validate
  timeout: 15000

on_failure: log
