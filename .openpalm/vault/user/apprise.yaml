# Apprise YAML config example
# General docs: https://appriseit.com/config/
# Discord docs: https://appriseit.com/services/discord/
# Telegram docs: https://appriseit.com/services/telegram/
# Slack docs: https://appriseit.com/services/slack/
# Microsoft Teams docs: https://appriseit.com/services/msteams/

version: 1

asset:
  app_id: OpenPalm
  app_desc: Example notification routing for OpenPalm and Apprise
  app_url: https://appriseit.com/config/
  theme: default
  async_mode: true
  body_format: markdown

groups:
  # oncall: ops, email, personal
  # all-chat: chat, teams
  # incident: ops, teams, personal

urls:
  # # Discord webhook -> fast team chat notifications
  # - discord://123456789012345678/abcdefghijklmnopqrstuvwxyz:
  #     tag:
  #       - discord
  #       - chat

  # # Telegram bot -> a personal or small-group delivery channel
  # - tgram://123456789:ABCdefGhIJKlmNoPQRstuVWxyZ/123456789/?format=markdown&preview=no:
  #     tag:
  #       - personal
  #       - chat

  # # Slack incoming webhook -> general team notifications
  # - slack://TXXXXXXXX/AXXXXXXXX/XXXXXXXXXXXXXXXXXXXXXXXX/%23deployments:
  #     tag:
  #       - ops
  #       - chat

  # # Slack bot token -> target channels, users, or encoded IDs
  # - slack://xoxb-XXXXXXXXXXXX-XXXXXXXXXXXX-XXXXXXXXXXXXXXXXXXXXXXXX/%23engineering:
  #     tag:
  #       - eng
  #       - chat

  # # Microsoft Teams incoming webhook for wider operational visibility
  # - msteams://contoso/abcdefgf8-2f4b-4eca-8f61-225c83db1967@abcdefg2-5a99-4849-8efc-c9e78d28e57d/291289f63a8abd3593e834af4d79f9fe/a2329f43-0ffb-46ab-948b-c9abdad9d643/:
  #     tag:
  #       - ops
  #       - teams

  # # Email destination for longer summaries or after-hours notice
  # - mailtos://smtp-user:app-password@smtp.gmail.com/team@example.com?from=bot@example.com&name=Ops%20Bot:
  #     tag: email
