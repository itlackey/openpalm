# Addon: OpenViking — knowledge management and semantic search engine
services:
  openviking:
    # Image tag configurable via .env for operator upgrades
    image: ghcr.io/itlackey/openviking:${OPENVIKING_IMAGE_TAG:-0.4.2}
    restart: unless-stopped
    user: "${OP_UID:-1000}:${OP_GID:-1000}"
    environment:
      # Embedding capabilities (resolved from stack.yaml via OP_CAP_*)
      OV_EMBEDDING_PROVIDER: ${OP_CAP_EMBEDDINGS_PROVIDER:-openai}
      OV_EMBEDDING_MODEL: ${OP_CAP_EMBEDDINGS_MODEL:-}
      OV_EMBEDDING_API_KEY: ${OP_CAP_EMBEDDINGS_API_KEY:-}
      OV_EMBEDDING_BASE_URL: ${OP_CAP_EMBEDDINGS_BASE_URL:-}
      OV_EMBEDDING_DIMS: ${OP_CAP_EMBEDDINGS_DIMS:-768}
      OV_ROOT_API_KEY: ${OPENVIKING_API_KEY:-}
    entrypoint: ["/app/entrypoint.sh"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${OP_HOME}/data/openviking:/workspace
    networks: [assistant_net]
    healthcheck:
      # curl is available in the OpenViking image (Python 3.13 + Debian)
      test: ["CMD", "curl", "-sf", "http://localhost:1933/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    labels:
      openpalm.name: OpenViking
      openpalm.description: Knowledge management and semantic search engine
      openpalm.icon: brain
      openpalm.category: ai
      openpalm.healthcheck: http://openviking:1933/health

  # Extend the existing assistant service with Viking env vars (additive only)
  assistant:
    environment:
      OPENVIKING_URL: http://openviking:1933
      OPENVIKING_API_KEY: ${OPENVIKING_API_KEY:-}
