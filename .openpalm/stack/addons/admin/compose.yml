# Addon: Admin Panel — Web-based admin UI and API
services:
  # -- Docker Socket Proxy ---------------------------------------------------
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:v0.4.2@sha256:1f3a6f303320723d199d2316a3e82b2e2685d86c275d5e3deeaf182573b47476
    restart: unless-stopped
    environment:
      CONTAINERS: 1
      IMAGES: 1
      NETWORKS: 1
      VOLUMES: 1
      EXEC: 0
      POST: 1
      INFO: 1
    volumes:
      - ${OP_DOCKER_SOCK:-/var/run/docker.sock}:/var/run/docker.sock:ro
    networks: [admin_docker_net]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:2375/_ping || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  # -- Admin ------------------------------------------------------------------
  admin:
    image: ${OP_IMAGE_NAMESPACE:-openpalm}/admin:${OP_IMAGE_TAG:-latest}
    restart: unless-stopped
    init: true
    user: "${OP_UID:-1000}:${OP_GID:-1000}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${OP_ADMIN_BIND_ADDRESS:-127.0.0.1}:${OP_ADMIN_PORT:-3880}:8100"
      - "${OP_ADMIN_OPENCODE_BIND_ADDRESS:-127.0.0.1}:${OP_ADMIN_OPENCODE_PORT:-3881}:3881"
    environment:
      PORT: "8100"
      HOME: /home/node
      OP_HOME: /openpalm
      ADMIN_TOKEN: ${OP_ADMIN_TOKEN:-}
      MEMORY_AUTH_TOKEN: ${OP_MEMORY_TOKEN:-}
      MEMORY_API_URL: http://memory:8765
      MEMORY_USER_ID: ${MEMORY_USER_ID:-default_user}
      GUARDIAN_URL: http://guardian:8080
      OP_ASSISTANT_URL: http://assistant:4096
      OP_ADMIN_API_URL: http://localhost:8100
      OP_ADMIN_OPENCODE_PORT: "${OP_ADMIN_OPENCODE_PORT:-3881}"
      # OpenCode instance for admin AI assistant with admin-tools plugin
      OPENCODE_CONFIG_DIR: /etc/opencode
      OPENCODE_PORT: "3881"
      OPENCODE_AUTH: "false"
      # LLM provider keys — admin's OpenCode reads from vault mount
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      # Docker API via socket proxy
      DOCKER_HOST: tcp://docker-socket-proxy:2375
    volumes:
      - ${OP_HOME}:/openpalm
      - ${OP_HOME}/data/admin:/home/node
      - ${OP_HOME}/data/workspace:/work
      - ${HOME}/.cache/openpalm/registry:/cache/registry
      # GPG agent socket for pass backend (read-only; only needed when pass is active)
      - type: bind
        source: ${GNUPGHOME:-${HOME}/.gnupg}
        target: /home/node/.gnupg
        read_only: true
        bind:
          create_host_path: true
    networks: [assistant_net, admin_docker_net]
    depends_on:
      docker-socket-proxy:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8100/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    labels:
      openpalm.name: Admin Panel
      openpalm.description: Web-based admin UI and API for managing the OpenPalm stack
      openpalm.icon: settings
      openpalm.category: management

networks:
  admin_docker_net: # Isolated: only admin + docker-socket-proxy
