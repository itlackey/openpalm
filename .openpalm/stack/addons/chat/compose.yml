# Addon: Chat — chat-focused API edge
services:
  chat:
    image: ${OP_IMAGE_NAMESPACE:-openpalm}/channel:${OP_IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "${OP_CHAT_BIND_ADDRESS:-127.0.0.1}:${OP_CHAT_PORT:-3820}:8181"
    environment:
      PORT: "8181"
      CHANNEL_NAME: "Chat"
      GUARDIAN_URL: http://guardian:8080
      CHANNEL_PACKAGE: "@openpalm/channel-chat"
      CHANNEL_SECRET: ${CHANNEL_CHAT_SECRET:-}
    networks: [channel_lan]
    depends_on:
      guardian:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8181' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    labels:
      openpalm.name: Chat
      openpalm.description: OpenAI-compatible chat edge for conversational clients
      openpalm.icon: message-circle
      openpalm.category: messaging
      openpalm.healthcheck: http://chat:8181/health
