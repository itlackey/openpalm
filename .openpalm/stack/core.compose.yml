# OpenPalm — Core Services
#
# This file defines the core infrastructure. Addon services are added
# via compose overlays in stack/addons/.
#
# Docker Compose reads variable values via --env-file vault/stack/stack.env --env-file vault/user/user.env.
#
# Directory model (v0.10.0):
#   ~/.openpalm/config/       — user-editable, non-secret configuration
#   ~/.openpalm/vault/stack/   — system-managed secrets (stack.env)
#   ~/.openpalm/vault/user/    — user-managed runtime files (user.env)
#   ~/.openpalm/data/          — service-managed persistent data
#   ~/.openpalm/logs/          — consolidated audit/debug output

services:
  # ── Memory ─────────────────────────────────────────────────────────
  # Lightweight Bun.js wrapper around @openpalm/memory with sqlite-vec.
  memory:
    image: ${OP_IMAGE_NAMESPACE:-openpalm}/memory:${OP_IMAGE_TAG:-latest}
    restart: unless-stopped
    user: "${OP_UID:-1000}:${OP_GID:-1000}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      MEMORY_DATA_DIR: /data
      HOME: /data
      MEM0_DIR: /data/.mem0
      MEMORY_AUTH_TOKEN: ${OP_MEMORY_TOKEN:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
    ports:
      - "${OP_MEMORY_BIND_ADDRESS:-127.0.0.1}:${OP_MEMORY_PORT:-3898}:8765"
    env_file:
      - path: ${OP_HOME}/vault/stack/services/memory/managed.env
        required: false
    volumes:
      - ${OP_HOME}/data/memory:/data
    networks: [ assistant_net ]
    healthcheck:
      test: [ "CMD-SHELL", "bun -e \"const r=await fetch('http://localhost:8765/health');if(!r.ok)process.exit(1)\" || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 10s

  # ── Assistant (opencode runtime — NO docker socket) ────────────────
  assistant:
    image: ${OP_IMAGE_NAMESPACE:-openpalm}/assistant:${OP_IMAGE_TAG:-latest}
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

    environment:
      OPENCODE_CONFIG_DIR: /etc/opencode
      OPENCODE_PORT: "4096"
      OPENCODE_AUTH: "false"
      OPENCODE_ENABLE_SSH: ${OPENCODE_ENABLE_SSH:-0}
      TERM: xterm-256color
      HOME: /home/opencode
      AKM_STASH_DIR: /stash
      OP_ADMIN_API_URL: ${OP_ADMIN_API_URL:-}
      OP_ASSISTANT_TOKEN: ${OP_ASSISTANT_TOKEN:-}
      MEMORY_API_URL: http://memory:8765
      MEMORY_AUTH_TOKEN: ${OP_MEMORY_TOKEN:-}
      MEMORY_USER_ID: ${MEMORY_USER_ID:-default_user}
      OP_UID: ${OP_UID:-1000}
      OP_GID: ${OP_GID:-1000}
    ports:
      - "${OP_ASSISTANT_BIND_ADDRESS:-127.0.0.1}:${OP_ASSISTANT_PORT:-3800}:4096"
      - "${OP_ASSISTANT_SSH_BIND_ADDRESS:-127.0.0.1}:${OP_ASSISTANT_SSH_PORT:-2222}:22"
    volumes:
      - ${OP_HOME}/config:/etc/openpalm
      - ${OP_HOME}/config/assistant:/home/opencode/.config/opencode
      - ${OP_HOME}/vault/stack/auth.json:/home/opencode/.local/share/opencode/auth.json
      - ${OP_HOME}/vault/user/user.env:/etc/openpalm-vault/user.env:ro
      - ${OP_HOME}/data/assistant:/home/opencode
      - ${OP_HOME}/data/stash:/home/opencode/.akm
      - ${OP_HOME}/data/workspace:/work
      - ${OP_HOME}/logs/opencode:/home/opencode/.local/state/opencode
    env_file:
      - path: ${OP_HOME}/vault/user/user.env
        required: false
    working_dir: /work
    networks: [ assistant_net ]
    depends_on:
      memory:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:4096/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Guardian ────────────────────────────────────────────────────────
  # Channel HMAC secrets are loaded via env_file so newly installed
  # channels automatically receive their credentials without modifying
  # this file. Installing a channel triggers a guardian recreate (~2 s).
  guardian:
    image: ${OP_IMAGE_NAMESPACE:-openpalm}/guardian:${OP_IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - path: ${OP_HOME}/vault/stack/stack.env
        required: false
    environment:
      HOME: /app/data
      PORT: "8080"
      OP_ASSISTANT_URL: http://assistant:4096
      OPENCODE_TIMEOUT_MS: "0"
      ADMIN_TOKEN: ${OP_ADMIN_TOKEN:-}
      GUARDIAN_AUDIT_PATH: /app/audit/guardian-audit.log
    volumes:
      - ${OP_HOME}/data/guardian:/app/data
      - ${OP_HOME}/logs:/app/audit
    user: "${OP_UID:-1000}:${OP_GID:-1000}"
    networks: [ channel_lan, channel_public, assistant_net ]
    depends_on:
      assistant:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "bun -e \"const r=await fetch('http://localhost:8080/health');if(!r.ok)process.exit(1)\" || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Scheduler (automation engine — NO docker socket) ─────────────
  scheduler:
    image: ${OP_IMAGE_NAMESPACE:-openpalm}/scheduler:${OP_IMAGE_TAG:-latest}
    restart: unless-stopped
    user: "${OP_UID:-1000}:${OP_GID:-1000}"
    environment:
      PORT: "8090"
      OP_HOME: /openpalm
      OP_ADMIN_TOKEN: ${OP_ASSISTANT_TOKEN:-}
      OP_ADMIN_API_URL: ${OP_ADMIN_API_URL:-}
      OPENCODE_API_URL: http://assistant:4096
      OPENCODE_SERVER_PASSWORD: ${OP_OPENCODE_PASSWORD:-}
      MEMORY_API_URL: http://memory:8765
    ports:
      - "127.0.0.1:${OP_SCHEDULER_PORT:-3897}:8090"
    volumes:
      - ${OP_HOME}/config:/openpalm/config:ro
    networks: [ assistant_net ]
    depends_on:
      assistant:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "bun -e \"const r=await fetch('http://localhost:8090/health');if(!r.ok)process.exit(1)\" || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

# Channel networks: services join channel_lan (LAN-restricted) or
# channel_public (publicly accessible) to control access.
networks:
  channel_lan:
  channel_public:
  assistant_net:
