# OpenPalm setup file for CLI-driven install.
# The current release CLI requires a v2-style document with a top-level `spec` field.
# Fill in values to match your environment before deploying.
#
# Azure OpenAI base URL format:
#   https://<RESOURCE_NAME>.openai.azure.com/openai/v1
# The API key can be found in the Azure Portal under your resource's Keys section.
#
# Secrets (adminToken, assistantToken, Slack tokens) are pulled from Azure
# Key Vault at first boot.  The bootstrap script patches this file with real
# values using structured YAML editing before `openpalm install` runs.
#
# Slack: the channel is enabled automatically when SLACK_BOT_TOKEN and
# SLACK_APP_TOKEN are provided at deploy time.  Otherwise it stays disabled.

version: 2
spec:
  owner:
    name: Your Name
    email: you@example.com

  security:
    adminToken: PLACEHOLDER_FROM_KEYVAULT
    assistantToken: PLACEHOLDER_FROM_KEYVAULT
    accessScope: local

  connections:
    - id: azure-openai
      name: Azure OpenAI / Foundry
      provider: openai
      baseUrl: https://YOUR-RESOURCE.openai.azure.com/openai/v1
      apiKey: YOUR_API_KEY
      managed: false

  assignments:
    llm:
      connectionId: azure-openai
      model: gpt-4o
    embeddings:
      connectionId: azure-openai
      model: text-embedding-3-large

  memory:
    enabled: true

  channels:
    api:
      enabled: true
    discord:
      enabled: false
    slack:
      enabled: false
    voice:
      enabled: false

  services:
    admin:
      enabled: true
    guardian:
      enabled: true
    scheduler:
      enabled: true
