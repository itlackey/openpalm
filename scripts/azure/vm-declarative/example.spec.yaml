# OpenPalm setup spec — defines what to deploy.
#
# Copy to deploy.spec.yaml and edit.
# Secret fields use ${VAR} references resolved from deploy.env at boot.

spec:
  version: 2
  capabilities:
    llm: openai/gpt-4o
    embeddings:
      provider: openai
      model: text-embedding-3-large
      dims: 0
    memory:
      userId: default_user

security:
  adminToken: ${OP_ADMIN_TOKEN}

owner:
  name: Your Name
  email: you@example.com

capabilities:
  - id: openai-main
    name: OpenAI
    provider: openai
    baseUrl: ""
    apiKey: ${OPENAI_API_KEY}

# Uncomment to enable Slack channel:
# channelCredentials:
#   slack:
#     slackBotToken: ${SLACK_BOT_TOKEN}
#     slackAppToken: ${SLACK_APP_TOKEN}
