# Example OpenPalm setup spec.
# Copy this file, fill in your real values, and pass it as SETUP_SPEC_FILE.
# The CLI reads this directly — put your actual secrets here.

version: 2
spec:
  owner:
    name: Your Name
    email: you@example.com

  security:
    adminToken: change-me-to-a-long-random-secret
    accessScope: local

  connections:
    - id: azure-openai
      name: Azure OpenAI
      provider: openai
      baseUrl: https://YOUR-RESOURCE.openai.azure.com/openai/v1
      apiKey: YOUR_API_KEY
      managed: false

  assignments:
    llm:
      connectionId: azure-openai
      model: gpt-4o
    embeddings:
      connectionId: azure-openai
      model: text-embedding-3-large

  memory:
    enabled: true

  channels:
    api:
      enabled: true
    slack:
      enabled: true
    discord:
      enabled: false
    voice:
      enabled: false

  # Slack tokens — only needed if channels.slack.enabled is true.
  channelCredentials:
    slack:
      slackBotToken: xoxb-YOUR-BOT-TOKEN
      slackAppToken: xapp-YOUR-APP-TOKEN

  services:
    admin:
      enabled: true
    guardian:
      enabled: true
    scheduler:
      enabled: true
