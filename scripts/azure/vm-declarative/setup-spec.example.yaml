# Example OpenPalm setup spec for file-based install.
#
# Secrets (API keys, admin token) are NOT stored here.
# They come from environment variables at install time.
#
# Local usage:
#   export OP_ADMIN_TOKEN=your-admin-token
#   export OPENAI_API_KEY=sk-...
#   openpalm install --file setup-spec.yaml
#
# Azure VM deployment:
#   Secrets go in secrets.env (stored in Key Vault).
#   first-boot.sh sources them before running install.

version: 2
capabilities:
  llm: openai/gpt-4o
  embeddings:
    provider: openai
    model: text-embedding-3-large
    dims: 0
  memory:
    userId: default_user

# adminToken resolved from OP_ADMIN_TOKEN env var
security: {}

owner:
  name: Your Name
  email: you@example.com

# Provider connections.
# apiKey is optional — resolved from standard env vars (OPENAI_API_KEY, etc.)
connections:
  - id: openai-main
    name: OpenAI
    provider: openai
    baseUrl: ""
    apiKey: ""

# Channel credentials resolved from env vars (SLACK_BOT_TOKEN, etc.)
# channelCredentials:
#   slack:
#     slackBotToken: ""
#     slackAppToken: ""
