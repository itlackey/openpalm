# Component: Discord — gateway-based Discord bot adapter
# Connects outbound to Discord via WebSocket (no public URL needed).
# Requires Message Content Intent enabled in Discord Developer Portal.
services:
  openpalm-${INSTANCE_ID}:
    image: ${OPENPALM_IMAGE_NAMESPACE:-ghcr.io/itlackey/openpalm}-channel:${OPENPALM_IMAGE_TAG:-latest}
    container_name: openpalm-${INSTANCE_ID}
    restart: unless-stopped
    env_file:
      - ${INSTANCE_DIR}/.env
    environment:
      PORT: "8184"
      GUARDIAN_URL: http://guardian:8080
      CHANNEL_NAME: "Discord Bot"
      CHANNEL_PACKAGE: "@openpalm/channel-discord"
    networks:
      - openpalm-internal
    depends_on:
      guardian:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8184' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    labels:
      openpalm.name: Discord
      openpalm.description: Discord bot channel adapter via WebSocket gateway
      openpalm.icon: message-circle
      openpalm.category: messaging
      openpalm.healthcheck: http://openpalm-${INSTANCE_ID}:8184/health
