# Component: Slack — socket mode Slack bot adapter
# Connects outbound to Slack via WebSocket (no public URL needed).
# Requires Socket Mode enabled in Slack App settings.
services:
  openpalm-${INSTANCE_ID}:
    image: ${OPENPALM_IMAGE_NAMESPACE:-ghcr.io/itlackey/openpalm}-channel:${OPENPALM_IMAGE_TAG:-latest}
    container_name: openpalm-${INSTANCE_ID}
    restart: unless-stopped
    env_file:
      - ${INSTANCE_DIR}/.env
    environment:
      PORT: "8185"
      GUARDIAN_URL: http://guardian:8080
      CHANNEL_NAME: "Slack Bot"
      CHANNEL_PACKAGE: "@openpalm/channel-slack"
    networks:
      - openpalm-internal
    depends_on:
      guardian:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8185' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    labels:
      openpalm.name: Slack
      openpalm.description: Slack bot adapter via Socket Mode WebSocket
      openpalm.icon: hash
      openpalm.category: messaging
      openpalm.healthcheck: http://openpalm-${INSTANCE_ID}:8185/health
