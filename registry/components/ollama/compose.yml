# Component: Ollama — Local LLM inference server
services:
  openpalm-${INSTANCE_ID}:
    image: ollama/ollama:latest
    container_name: openpalm-${INSTANCE_ID}
    restart: unless-stopped
    env_file:
      - ${INSTANCE_DIR}/.env
    ports:
      - "${OP_OLLAMA_BIND_ADDRESS:-127.0.0.1}:11434:11434"
    volumes:
      - ${OP_HOME:-${HOME}/.openpalm}/data/ollama:/root/.ollama
    networks: [assistant_net]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    labels:
      openpalm.name: Ollama
      openpalm.description: Local LLM inference server for running AI models
      openpalm.icon: cpu
      openpalm.category: ai
