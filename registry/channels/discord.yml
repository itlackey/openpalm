# Channel: Discord — Discord bot adapter
services:
  channel-discord:
    image: ${OPENPALM_IMAGE_NAMESPACE:-openpalm}/channel:${OPENPALM_IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      PORT: "8184"
      GUARDIAN_URL: http://guardian:8080
      CHANNEL_NAME: "Discord Bot"
      CHANNEL_PACKAGE: "@openpalm/channel-discord"
      CHANNEL_DISCORD_SECRET: ${CHANNEL_DISCORD_SECRET}
      DISCORD_PUBLIC_KEY: ${DISCORD_PUBLIC_KEY:-}
      DISCORD_ALLOW_UNSIGNED_INTERACTIONS: ${DISCORD_ALLOW_UNSIGNED_INTERACTIONS:-false}
      DISCORD_APPLICATION_ID: ${DISCORD_APPLICATION_ID:-}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      DISCORD_REGISTER_COMMANDS: ${DISCORD_REGISTER_COMMANDS:-true}
      DISCORD_ALLOWED_GUILDS: ${DISCORD_ALLOWED_GUILDS:-}
      DISCORD_ALLOWED_ROLES: ${DISCORD_ALLOWED_ROLES:-}
      DISCORD_ALLOWED_USERS: ${DISCORD_ALLOWED_USERS:-}
      DISCORD_BLOCKED_USERS: ${DISCORD_BLOCKED_USERS:-}
      DISCORD_CUSTOM_COMMANDS: ${DISCORD_CUSTOM_COMMANDS:-}
    networks: [channel_lan]
    depends_on:
      guardian:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8184' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
