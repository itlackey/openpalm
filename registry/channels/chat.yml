# Channel: Chat — OpenAI/Anthropic-compatible API adapter
services:
  channel-chat:
    image: ${OP_IMAGE_NAMESPACE:-openpalm}/channel:${OP_IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      PORT: "8181"
      CHANNEL_NAME: "Chat"
      GUARDIAN_URL: http://guardian:8080
      CHANNEL_PACKAGE: "@openpalm/channel-chat"
      CHANNEL_CHAT_SECRET: ${CHANNEL_CHAT_SECRET}
    networks: [channel_lan]
    depends_on:
      guardian:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8181' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
