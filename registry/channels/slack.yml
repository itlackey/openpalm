# Channel: Slack — Socket Mode Slack bot adapter
# Connects outbound to Slack via WebSocket (no public URL needed).
# Requires Socket Mode enabled in Slack App settings.
services:
  channel-slack:
    image: ${OP_IMAGE_NAMESPACE:-openpalm}/channel:${OP_IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      PORT: "8185"
      GUARDIAN_URL: http://guardian:8080
      CHANNEL_NAME: "Slack Bot"
      CHANNEL_PACKAGE: "@openpalm/channel-slack"
      CHANNEL_SLACK_SECRET: ${CHANNEL_SLACK_SECRET}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      SLACK_APP_TOKEN: ${SLACK_APP_TOKEN:-}
      SLACK_ALLOWED_CHANNELS: ${SLACK_ALLOWED_CHANNELS:-}
      SLACK_ALLOWED_USERS: ${SLACK_ALLOWED_USERS:-}
      SLACK_BLOCKED_USERS: ${SLACK_BLOCKED_USERS:-}
      SLACK_THREAD_TTL_HOURS: ${SLACK_THREAD_TTL_HOURS:-24}
      SLACK_FORWARD_TIMEOUT_MS: ${SLACK_FORWARD_TIMEOUT_MS:-0}
    networks: [channel_lan]
    depends_on:
      guardian:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8185' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
