# Apprise TEXT config example
# General docs: https://appriseit.com/config/
# Telegram docs: https://appriseit.com/services/telegram/
# Slack docs: https://appriseit.com/services/slack/
# Microsoft Teams docs: https://appriseit.com/services/msteams/
#
# Syntax:
#   tag=url
#   tag1,tag2=url
#   group = tag1, tag2
#   include /path/to/other-apprise.conf

# Telegram bot -> a personal or small-group delivery channel
# Format: tgram://{bot_token}/{chat_id}/?format=markdown&preview=no
chat,personal=tgram://123456789:ABCdefGhIJKlmNoPQRstuVWxyZ/123456789/?format=markdown&preview=no

# Slack incoming webhook -> general team notifications
# Format: slack://{tokenA}/{tokenB}/{tokenC}/#{channel}
ops,chat=slack://TXXXXXXXX/AXXXXXXXX/XXXXXXXXXXXXXXXXXXXXXXXX/%23deployments

# Slack bot token -> target channels, users, or encoded IDs
# Format: slack://{oauth_token}/#{channel}
eng,chat=slack://xoxb-XXXXXXXXXXXX-XXXXXXXXXXXX-XXXXXXXXXXXXXXXXXXXXXXXX/%23engineering

# Microsoft Teams incoming webhook for wider operational visibility
# Format: msteams://{team}/{tokenA}/{tokenB}/{tokenC}/
ops,teams=msteams://contoso/abcdefgf8-2f4b-4eca-8f61-225c83db1967@abcdefg2-5a99-4849-8efc-c9e78d28e57d/291289f63a8abd3593e834af4d79f9fe/a2329f43-0ffb-46ab-948b-c9abdad9d643/

# Email destination for longer summaries or after-hours notice
email=mailtos://smtp-user:app-password@smtp.gmail.com/team@example.com?from=bot@example.com&name=Ops%20Bot

# Optional tag groups. These let you route one message to several targets.
oncall = ops, email, personal
all-chat = chat, teams
incident = ops, teams, personal
