# Local development override — builds images from source instead of pulling
#
# Preferred usage:
#   bun run dev:build
#
# Manual equivalent (from project root):
#   docker compose --project-directory . \
#     -f assets/docker-compose.yml \
#     -f compose.dev.yaml \
#     --env-file .dev/state/artifacts/stack.env \
#     --env-file .dev/state/artifacts/secrets.env \
#     up --build -d
#
# The --project-directory . flag is REQUIRED when the core compose file lives
# in a different directory (assets/ or .dev/state/artifacts/). Without it,
# Docker Compose resolves build contexts relative to the first -f file's
# directory, which breaks builds.

services:
  admin:
    build:
      context: .
      dockerfile: core/admin/Dockerfile
    image: ${OPENPALM_IMAGE_NAMESPACE:-openpalm}/admin:${OPENPALM_IMAGE_TAG:-latest}

  guardian:
    build:
      context: .
      dockerfile: core/guardian/Dockerfile
    image: ${OPENPALM_IMAGE_NAMESPACE:-openpalm}/guardian:${OPENPALM_IMAGE_TAG:-latest}

  assistant:
    build:
      context: .
      dockerfile: core/assistant/Dockerfile
    image: ${OPENPALM_IMAGE_NAMESPACE:-openpalm}/assistant:${OPENPALM_IMAGE_TAG:-latest}
    # Dev override: blank out cloud LLM keys and configure the lmstudio
    # provider to point at local Ollama. OpenCode's openai provider uses the
    # Responses API (/v1/responses) which Ollama doesn't support, so we use
    # the lmstudio provider which uses the Chat Completions API instead.
    environment:
      ANTHROPIC_API_KEY: ""
      GROQ_API_KEY: ""
      MISTRAL_API_KEY: ""
      GOOGLE_API_KEY: ""
      OPENAI_API_KEY: ""
      LMSTUDIO_API_KEY: "ollama"
      LMSTUDIO_BASE_URL: "http://host.docker.internal:11434/v1"

  channel:
    build:
      context: .
      dockerfile: core/channel/Dockerfile
    image: ${OPENPALM_IMAGE_NAMESPACE:-openpalm}/channel:${OPENPALM_IMAGE_TAG:-latest}

  memory:
    build:
      context: .
      dockerfile: core/memory/Dockerfile
    image: ${OPENPALM_IMAGE_NAMESPACE:-openpalm}/memory:${OPENPALM_IMAGE_TAG:-latest}
