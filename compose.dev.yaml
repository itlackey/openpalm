# Local development override — builds images from source instead of pulling
#
# Preferred usage:
#   bun run dev:build
#
# Manual equivalent (from project root):
#   docker compose --project-directory . \
#     -f .openpalm/stack/core.compose.yml \
#     -f compose.dev.yaml \
#     --env-file .dev/vault/stack/stack.env \
#     --env-file .dev/vault/user/user.env \
#     up --build -d
#
# The --project-directory . flag is REQUIRED when the core compose file lives
# in a different directory (.openpalm/stack/ or .dev/stack/). Without it,
# Docker Compose resolves build contexts relative to the first -f file's
# directory, which breaks builds.
#
# Varlock: the varlock binary is built once via the varlock service below.
# All services that need it reference the built image via additional_contexts.
# Build order: `docker compose build varlock` first, then everything else.
# `docker compose build` (no args) handles this automatically when varlock
# is already cached.

services:
  # ── Varlock (build-only) ──────────────────────────────────────────────
  # Shared build stage for the varlock secret-redaction binary.
  # Not a runtime service — only exists to produce the image that other
  # Dockerfiles COPY the binary from. See .docker/varlock.Dockerfile.
  varlock:
    build:
      context: .
      dockerfile: .docker/varlock.Dockerfile
    image: ${OP_IMAGE_NAMESPACE:-openpalm}/varlock:${OP_IMAGE_TAG:-dev}
    profiles: ["build"]

  admin:
    build:
      context: .
      dockerfile: core/admin/Dockerfile
      additional_contexts:
        - varlock=docker-image://${OP_IMAGE_NAMESPACE:-openpalm}/varlock:${OP_IMAGE_TAG:-dev}
    image: ${OP_IMAGE_NAMESPACE:-openpalm}/admin:dev

  guardian:
    build:
      context: .
      dockerfile: core/guardian/Dockerfile
      additional_contexts:
        - varlock=docker-image://${OP_IMAGE_NAMESPACE:-openpalm}/varlock:${OP_IMAGE_TAG:-dev}
    image: ${OP_IMAGE_NAMESPACE:-openpalm}/guardian:dev
    # Dev override: publish guardian to host for integration tests.
    # Uses OP_GUARDIAN_PORT (default 8180) to avoid conflict with the legacy
    # ingress port 8080 (which tests expect to be ECONNREFUSED).
    ports:
      - "${OP_GUARDIAN_BIND_ADDRESS:-127.0.0.1}:${OP_GUARDIAN_PORT:-8180}:8080"
    # Mount guardian.env so guardian can re-read channel secrets dynamically
    # (tests append CHANNEL_*_SECRET vars without restarting the container).
    # Channel HMAC secrets live exclusively in guardian.env (not stack.env).

  assistant:
    build:
      context: .
      dockerfile: core/assistant/Dockerfile
      additional_contexts:
        - varlock=docker-image://${OP_IMAGE_NAMESPACE:-openpalm}/varlock:${OP_IMAGE_TAG:-dev}
    image: ${OP_IMAGE_NAMESPACE:-openpalm}/assistant:dev
    # Dev override: use host env API keys (ANTHROPIC_API_KEY, OPENAI_API_KEY).
    # OpenCode picks the default model based on available keys.
    environment:
      GROQ_API_KEY: ""
      MISTRAL_API_KEY: ""
      GOOGLE_API_KEY: ""
      # Dev: lmstudio provider with socat proxy to Ollama on host.
      # LMSTUDIO_API_KEY must be non-empty for OpenCode to activate the provider.
      # LMSTUDIO_BASE_URL tells entrypoint.sh socat proxy where to forward.
      LMSTUDIO_API_KEY: "ollama"
      LMSTUDIO_BASE_URL: "http://host.docker.internal:11434/v1"

  channel:
    build:
      context: .
      dockerfile: core/channel/Dockerfile
      additional_contexts:
        - varlock=docker-image://${OP_IMAGE_NAMESPACE:-openpalm}/varlock:${OP_IMAGE_TAG:-dev}
    image: ${OP_IMAGE_NAMESPACE:-openpalm}/channel:dev

  scheduler:
    build:
      context: .
      dockerfile: core/scheduler/Dockerfile
      additional_contexts:
        - varlock=docker-image://${OP_IMAGE_NAMESPACE:-openpalm}/varlock:${OP_IMAGE_TAG:-dev}
    image: ${OP_IMAGE_NAMESPACE:-openpalm}/scheduler:dev

  memory:
    build:
      context: .
      dockerfile: core/memory/Dockerfile
      additional_contexts:
        - varlock=docker-image://${OP_IMAGE_NAMESPACE:-openpalm}/varlock:${OP_IMAGE_TAG:-dev}
    image: ${OP_IMAGE_NAMESPACE:-openpalm}/memory:dev

  # Voice channel dev override: mount local source instead of npm install.
  # Requires voice.yml overlay loaded before this file (-f channels/voice.yml -f compose.dev.yaml).
  channel-voice:
    image: ${OP_IMAGE_NAMESPACE:-openpalm}/channel:dev
    ports:
      - "${OP_VOICE_BIND_ADDRESS:-127.0.0.1}:${OP_VOICE_PORT:-8186}:8186"
    env_file:
      - path: ${OP_HOME}/vault/stack/stack.env
        required: false
      - path: ${OP_HOME}/vault/user/user.env
        required: false
      - path: ${OP_HOME}/vault/stack/guardian.env
        required: false
    volumes:
      - ./packages/channel-voice:/app/channel-voice:ro
    environment:
      PORT: "8186"
      CHANNEL_NAME: "Voice"
      GUARDIAN_URL: http://guardian:8080
      CHANNEL_PACKAGE: ""
      CHANNEL_FILE: /app/channel-voice/src/index.ts
      # Dev: no cloud TTS/STT — use browser fallback
      STT_API_KEY: ""
      TTS_API_KEY: ""
      STT_BASE_URL: ""
      TTS_BASE_URL: ""
      OPENAI_API_KEY: ""
    networks: [channel_lan]
    depends_on:
      guardian:
        condition: service_healthy
