# Local development override — builds images from source instead of pulling
#
# Preferred usage:
#   bun run dev:build
#
# Manual equivalent (from project root):
#   docker compose --project-directory . \
#     -f stack/core.compose.yml \
#     -f compose.dev.yaml \
#     --env-file .dev/vault/stack/stack.env \
#     --env-file .dev/vault/user/user.env \
#     up --build -d
#
# The --project-directory . flag is REQUIRED when the core compose file lives
# in a different directory (assets/ or .dev/config/components/). Without it,
# Docker Compose resolves build contexts relative to the first -f file's
# directory, which breaks builds.

services:
  admin:
    build:
      context: .
      dockerfile: core/admin/Dockerfile
    image: ${OP_IMAGE_NAMESPACE:-openpalm}/admin:${OP_IMAGE_TAG:-latest}

  guardian:
    build:
      context: .
      dockerfile: core/guardian/Dockerfile
    image: ${OP_IMAGE_NAMESPACE:-openpalm}/guardian:${OP_IMAGE_TAG:-latest}

  assistant:
    build:
      context: .
      dockerfile: core/assistant/Dockerfile
    image: ${OP_IMAGE_NAMESPACE:-openpalm}/assistant:${OP_IMAGE_TAG:-latest}
    # Dev override: use host env API keys (ANTHROPIC_API_KEY, OPENAI_API_KEY).
    # OpenCode picks the default model based on available keys.
    environment:
      GROQ_API_KEY: ""
      MISTRAL_API_KEY: ""
      GOOGLE_API_KEY: ""
      LMSTUDIO_API_KEY: ""
      LMSTUDIO_BASE_URL: ""

  channel:
    build:
      context: .
      dockerfile: core/channel/Dockerfile
    image: ${OP_IMAGE_NAMESPACE:-openpalm}/channel:${OP_IMAGE_TAG:-latest}

  scheduler:
    build:
      context: .
      dockerfile: core/scheduler/Dockerfile
    image: ${OP_IMAGE_NAMESPACE:-openpalm}/scheduler:${OP_IMAGE_TAG:-latest}

  memory:
    build:
      context: .
      dockerfile: core/memory/Dockerfile
    image: ${OP_IMAGE_NAMESPACE:-openpalm}/memory:${OP_IMAGE_TAG:-latest}

  # Voice channel dev override: mount local source instead of npm install.
  # Requires voice.yml overlay loaded before this file (-f channels/voice.yml -f compose.dev.yaml).
  channel-voice:
    image: ${OP_IMAGE_NAMESPACE:-openpalm}/channel:${OP_IMAGE_TAG:-latest}
    ports:
      - "8186:8186"
    volumes:
      - ./packages/channel-voice:/app/channel-voice:ro
    environment:
      CHANNEL_PACKAGE: ""
      CHANNEL_FILE: /app/channel-voice/src/index.ts
      # Dev: no cloud TTS/STT — use browser fallback
      STT_API_KEY: ""
      TTS_API_KEY: ""
      STT_BASE_URL: ""
      TTS_BASE_URL: ""
      OPENAI_API_KEY: ""
