# cleanup-data.yml — Core automation: compact memory database and remove stale data
#
# Runs every Sunday at 5 AM UTC (one hour after log cleanup). Runs SQLite
# VACUUM on the memory database to reclaim disk space after deletions,
# and removes temporary files that may accumulate in DATA_HOME.
#
# This is a core automation — installed by default. To customize, copy this
# file to ~/.config/openpalm/automations/cleanup-data.yml and edit there.
# User copies in CONFIG_HOME override the system version.

name: Cleanup Data
description: Compact memory database and remove stale temporary files
schedule: "0 5 * * 0"
enabled: true

action:
  type: shell
  command:
    - /bin/bash
    - -c
    - |
      # Compact SQLite memory database if it exists
      DB="$OP_DATA_HOME/memory/memories.db"
      if [ -f "$DB" ]; then
        sqlite3 "$DB" "VACUUM;" 2>/dev/null || true
      fi

      # Remove stale backup files older than 30 days
      if [ -d "$OP_DATA_HOME/backups" ]; then
        find "$OP_DATA_HOME/backups" -type f -mtime +30 -delete 2>/dev/null || true
      fi

      # Remove old staged artifact backups
      for bdir in "$OP_DATA_HOME"/*/backups; do
        [ -d "$bdir" ] || continue
        find "$bdir" -type f -mtime +30 -delete 2>/dev/null || true
      done
  timeout: 60000

on_failure: log
