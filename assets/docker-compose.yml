# OpenPalm — Core Services
#
# This file defines the core infrastructure. Component services are added
# via compose overlays in config/components/.
#
# Docker Compose reads variable values via --env-file vault/system.env --env-file vault/user.env.
#
# Directory model (v0.10.0):
#   ~/.openpalm/config/  — user-editable, non-secret configuration
#   ~/.openpalm/vault/   — secrets boundary (user.env, system.env)
#   ~/.openpalm/data/    — service-managed persistent data
#   ~/.openpalm/logs/    — consolidated audit/debug output

services:
  # ── Memory ─────────────────────────────────────────────────────────
  # Lightweight Bun.js wrapper around @openpalm/memory with sqlite-vec.
  memory:
    image: ${OPENPALM_IMAGE_NAMESPACE:-openpalm}/memory:${OPENPALM_IMAGE_TAG:-latest}
    restart: unless-stopped
    user: "${OPENPALM_UID:-1000}:${OPENPALM_GID:-1000}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      MEMORY_DATA_DIR: /data
      HOME: /data
      MEM0_DIR: /data/.mem0
      MEMORY_AUTH_TOKEN: ${MEMORY_AUTH_TOKEN:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
    ports:
      - "${OPENPALM_MEMORY_BIND_ADDRESS:-127.0.0.1}:${OPENPALM_MEMORY_PORT:-3898}:8765"
    volumes:
      - ${OPENPALM_HOME}/data/memory:/data
    networks: [ assistant_net ]
    healthcheck:
      test: [ "CMD-SHELL", "bun -e \"const r=await fetch('http://localhost:8765/health');if(!r.ok)process.exit(1)\" || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 10s

  # ── Assistant (opencode runtime — NO docker socket) ────────────────
  assistant:
    image: ${OPENPALM_IMAGE_NAMESPACE:-openpalm}/assistant:${OPENPALM_IMAGE_TAG:-latest}
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

    environment:
      OPENCODE_CONFIG_DIR: /etc/opencode
      OPENCODE_PORT: "4096"
      OPENCODE_AUTH: "false"
      OPENCODE_ENABLE_SSH: ${OPENCODE_ENABLE_SSH:-0}
      TERM: xterm-256color
      HOME: /home/opencode
      AKM_STASH_DIR: /stash
      OPENPALM_ADMIN_API_URL: ${OPENPALM_ADMIN_API_URL:-}
      OPENPALM_ADMIN_TOKEN: ${OPENPALM_ADMIN_TOKEN:-}
      MEMORY_API_URL: http://memory:8765
      MEMORY_AUTH_TOKEN: ${MEMORY_AUTH_TOKEN:-}
      MEMORY_USER_ID: ${MEMORY_USER_ID:-default_user}
      OPENPALM_UID: ${OPENPALM_UID:-1000}
      OPENPALM_GID: ${OPENPALM_GID:-1000}
    ports:
      - "${OPENPALM_ASSISTANT_BIND_ADDRESS:-127.0.0.1}:${OPENPALM_ASSISTANT_PORT:-3800}:4096"
      - "${OPENPALM_ASSISTANT_SSH_BIND_ADDRESS:-127.0.0.1}:${OPENPALM_ASSISTANT_SSH_PORT:-2222}:22"
    volumes:
      - ${OPENPALM_HOME}/config:/etc/openpalm:ro
      - ${OPENPALM_HOME}/config/assistant:/home/opencode/.config/opencode
      - ${OPENPALM_HOME}/vault/user.env:/etc/openpalm/user.env:ro
      - ${OPENPALM_HOME}/data/assistant:/home/opencode/.opencode
      - ${OPENPALM_HOME}/data/stash:/home/opencode/.akm
      - ${OPENPALM_HOME}/data/workspace:/work
      - ${OPENPALM_HOME}/logs/opencode:/home/opencode/.local/state/opencode
      - ${HOME}/.cache/openpalm/registry:/cache/registry
    working_dir: /work
    networks: [ assistant_net ]
    depends_on:
      memory:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:4096/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Guardian ────────────────────────────────────────────────────────
  # Channel HMAC secrets are loaded via env_file so newly installed
  # channels automatically receive their credentials without modifying
  # this file. Installing a channel triggers a guardian recreate (~2 s).
  guardian:
    image: ${OPENPALM_IMAGE_NAMESPACE:-openpalm}/guardian:${OPENPALM_IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - ${OPENPALM_HOME}/vault/system.env
    environment:
      HOME: /app/data
      PORT: "8080"
      OPENPALM_ASSISTANT_URL: http://assistant:4096
      OPENCODE_TIMEOUT_MS: "0"
      ADMIN_TOKEN: ${OPENPALM_ADMIN_TOKEN:-}
      GUARDIAN_AUDIT_PATH: /app/audit/guardian-audit.log
    volumes:
      - ${OPENPALM_HOME}/data/guardian:/app/data
      - ${OPENPALM_HOME}/logs:/app/audit
    user: "${OPENPALM_UID:-1000}:${OPENPALM_GID:-1000}"
    networks: [ channel_lan, channel_public, assistant_net ]
    depends_on:
      assistant:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "bun -e \"const r=await fetch('http://localhost:8080/health');if(!r.ok)process.exit(1)\" || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Scheduler (automation engine — NO docker socket) ─────────────
  scheduler:
    image: ${OPENPALM_IMAGE_NAMESPACE:-openpalm}/scheduler:${OPENPALM_IMAGE_TAG:-latest}
    restart: unless-stopped
    user: "${OPENPALM_UID:-1000}:${OPENPALM_GID:-1000}"
    environment:
      PORT: "8090"
      OPENPALM_HOME: /openpalm
      OPENPALM_ADMIN_TOKEN: ${OPENPALM_ADMIN_TOKEN:-}
      OPENPALM_ADMIN_API_URL: ${OPENPALM_ADMIN_API_URL:-}
      OPENCODE_API_URL: http://assistant:4096
      OPENCODE_SERVER_PASSWORD: ${OPENCODE_SERVER_PASSWORD:-}
      MEMORY_API_URL: http://memory:8765
    ports:
      - "127.0.0.1:${OPENPALM_SCHEDULER_PORT:-3897}:8090"
    volumes:
      - ${OPENPALM_HOME}/config:/openpalm/config:ro
    networks: [ assistant_net ]
    depends_on:
      assistant:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "bun -e \"const r=await fetch('http://localhost:8090/health');if(!r.ok)process.exit(1)\" || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

# Channel networks: services join channel_lan (LAN-restricted) or
# channel_public (publicly accessible) to control Caddy access.
networks:
  channel_lan:
  channel_public:
  assistant_net:
