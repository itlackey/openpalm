# OpenPalm — Core Services
#
# This file defines the core infrastructure. Channel services are added
# via compose overlays: docker compose -f docker-compose.yml -f channels/chat.yml up -d
#
# Docker Compose reads variable values from .env (standalone) or via --env-file (admin-managed).
# Copy .env.example to .env and fill in the required values.
#
# Directory model:
#   CONFIG_HOME (~/.config/openpalm)      — user-editable: secrets.env, channels/, assistant/
#   DATA_HOME   (~/.local/share/openpalm) — opaque service data (memory, etc.)
#   STATE_HOME  (~/.local/state/openpalm) — generated artifacts, audit logs

services:
  # ── Memory ─────────────────────────────────────────────────────────
  # Lightweight Bun.js wrapper around @openpalm/memory with sqlite-vec.
  memory:
    image: ${OPENPALM_IMAGE_NAMESPACE:-openpalm}/memory:${OPENPALM_IMAGE_TAG:-latest}
    restart: unless-stopped
    user: "${OPENPALM_UID:-1000}:${OPENPALM_GID:-1000}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      MEMORY_DATA_DIR: /data
      HOME: /data
      MEM0_DIR: /data/.mem0
      MEMORY_AUTH_TOKEN: ${MEMORY_AUTH_TOKEN:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
    ports:
      - "${OPENPALM_MEMORY_BIND_ADDRESS:-127.0.0.1}:8765:8765"
    volumes:
      - ${OPENPALM_DATA_HOME:-${HOME}/.local/share/openpalm}/memory:/data
      - ${OPENPALM_DATA_HOME:-${HOME}/.local/share/openpalm}/memory/default_config.json:/app/default_config.json
    networks: [ assistant_net ]
    healthcheck:
      test: [ "CMD-SHELL", "bun -e \"const r=await fetch('http://localhost:8765/health');if(!r.ok)process.exit(1)\" || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 10s

  # ── Assistant (opencode runtime — NO docker socket) ────────────────
  assistant:
    image: ${OPENPALM_IMAGE_NAMESPACE:-openpalm}/assistant:${OPENPALM_IMAGE_TAG:-latest}
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

    environment:
      OPENCODE_CONFIG_DIR: /etc/opencode
      OPENCODE_PORT: "4096"
      OPENCODE_AUTH: "false"
      OPENCODE_ENABLE_SSH: ${OPENCODE_ENABLE_SSH:-0}
      TERM: xterm-256color
      HOME: /home/opencode
      AKM_STASH_DIR: /stash
      OPENPALM_ADMIN_API_URL: ${OPENPALM_ADMIN_API_URL:-}
      OPENPALM_ADMIN_TOKEN: ${OPENPALM_ADMIN_TOKEN:-${ADMIN_TOKEN:-}}
      MEMORY_API_URL: http://memory:8765
      MEMORY_AUTH_TOKEN: ${MEMORY_AUTH_TOKEN:-}
      MEMORY_USER_ID: ${MEMORY_USER_ID:-default_user}
      OPENPALM_UID: ${OPENPALM_UID:-1000}
      OPENPALM_GID: ${OPENPALM_GID:-1000}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
    ports:
      - "${OPENPALM_ASSISTANT_BIND_ADDRESS:-127.0.0.1}:4096:4096"
      - "${OPENPALM_ASSISTANT_SSH_BIND_ADDRESS:-127.0.0.1}:${OPENPALM_ASSISTANT_SSH_PORT:-2222}:22"
    volumes:
      - ${OPENPALM_DATA_HOME:-${HOME}/.local/share/openpalm}/assistant:/etc/opencode
      - ${OPENPALM_CONFIG_HOME:-${HOME}/.config/openpalm}/assistant:/home/opencode/.config/opencode
      - ${OPENPALM_STATE_HOME:-${HOME}/.local/state/openpalm}/opencode:/home/opencode/.local/state/opencode
      - ${OPENPALM_DATA_HOME:-${HOME}/.local/share/openpalm}/opencode:/home/opencode/.local/share/opencode
      - ${OPENPALM_WORK_DIR:-${HOME}/openpalm}:/work
      - ${OPENPALM_CONFIG_HOME:-${HOME}/.config/openpalm}/stash:/stash
    working_dir: /work
    networks: [ assistant_net ]
    depends_on:
      memory:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:4096/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Guardian ────────────────────────────────────────────────────────
  guardian:
    image: ${OPENPALM_IMAGE_NAMESPACE:-openpalm}/guardian:${OPENPALM_IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      HOME: /app/data
      PORT: "8080"
      OPENPALM_ASSISTANT_URL: http://assistant:4096
      OPENCODE_TIMEOUT_MS: "0"
      ADMIN_TOKEN: ${OPENPALM_ADMIN_TOKEN:-${ADMIN_TOKEN:-}}
      GUARDIAN_AUDIT_PATH: /app/audit/guardian-audit.log
      # Guardian reads CHANNEL_*_SECRET from this file on every inbound request,
      # so channel secrets take effect without a container restart or recreation.
      # Uses a directory mount (not a file mount) so writes by the admin container
      # don't break the bind mount when the file inode changes.
      GUARDIAN_SECRETS_PATH: /app/secrets/stack.env
    # env_file loads stack.env at container startup so CHANNEL_*_SECRET are available
    # immediately. The bind-mount + GUARDIAN_SECRETS_PATH allows re-reading at runtime.
    env_file:
      - path: ${OPENPALM_STATE_HOME:-${HOME}/.local/state/openpalm}/artifacts/stack.env
        required: false
    volumes:
      - ${OPENPALM_DATA_HOME:-${HOME}/.local/share/openpalm}/guardian:/app/data
      - ${OPENPALM_STATE_HOME:-${HOME}/.local/state/openpalm}/audit:/app/audit
      - ${OPENPALM_STATE_HOME:-${HOME}/.local/state/openpalm}/artifacts:/app/secrets:ro
    user: "${OPENPALM_UID:-1000}:${OPENPALM_GID:-1000}"
    networks: [ channel_lan, channel_public, assistant_net ]
    depends_on:
      assistant:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "bun -e \"const r=await fetch('http://localhost:8080/health');if(!r.ok)process.exit(1)\" || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Scheduler (automation engine — NO docker socket) ─────────────
  scheduler:
    image: ${OPENPALM_IMAGE_NAMESPACE:-openpalm}/scheduler:${OPENPALM_IMAGE_TAG:-latest}
    restart: unless-stopped
    user: "${OPENPALM_UID:-1000}:${OPENPALM_GID:-1000}"
    environment:
      PORT: "8090"
      OPENPALM_STATE_HOME: /app/state
      OPENPALM_ADMIN_TOKEN: ${OPENPALM_ADMIN_TOKEN:-${ADMIN_TOKEN:-}}
      OPENPALM_ADMIN_API_URL: ${OPENPALM_ADMIN_API_URL:-}
      OPENCODE_API_URL: http://assistant:4096
      OPENCODE_SERVER_PASSWORD: ${OPENCODE_SERVER_PASSWORD:-}
      MEMORY_API_URL: http://memory:8765
    volumes:
      - ${OPENPALM_STATE_HOME:-${HOME}/.local/state/openpalm}/automations:/app/state/automations:ro
      - ${OPENPALM_STATE_HOME:-${HOME}/.local/state/openpalm}/artifacts:/app/state/artifacts:ro
    networks: [ assistant_net ]
    depends_on:
      assistant:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "bun -e \"const r=await fetch('http://localhost:8090/health');if(!r.ok)process.exit(1)\" || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

# Channel networks: services join channel_lan (LAN-restricted) or
# channel_public (publicly accessible) to control Caddy access.
networks:
  channel_lan:
  channel_public:
  assistant_net:
