# OpenPalm — Admin service overlay
#
# Merged into the compose stack when the user enables the admin dashboard.
# Includes Caddy (reverse proxy), Docker Socket Proxy, and the Admin UI.

services:
  # ── Caddy (reverse proxy) ──────────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    user: "${OPENPALM_UID:-1000}:${OPENPALM_GID:-1000}"
    ports:
      - "${OPENPALM_INGRESS_BIND_ADDRESS:-127.0.0.1}:${OPENPALM_INGRESS_PORT:-3080}:80"
    volumes:
      - ${OPENPALM_HOME}/data/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ${OPENPALM_HOME}/data/caddy/channels:/etc/caddy/channels:ro
      - ${OPENPALM_HOME}/data/caddy/data:/data/caddy
    command: caddy run --config /etc/caddy/Caddyfile --adapter caddyfile
    networks: [ assistant_net, channel_lan, channel_public ]
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:2019/config/ || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Docker Socket Proxy ───────────────────────────────────────────
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:v0.4.2@sha256:1f3a6f303320723d199d2316a3e82b2e2685d86c275d5e3deeaf182573b47476
    restart: unless-stopped
    environment:
      CONTAINERS: 1
      IMAGES: 1
      NETWORKS: 1
      VOLUMES: 1
      EXEC: 0
      POST: 1
      INFO: 1
    volumes:
      - ${OPENPALM_DOCKER_SOCK:-/var/run/docker.sock}:/var/run/docker.sock:ro
    networks: [ admin_docker_net ]
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:2375/_ping || exit 1" ]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  # ── Admin ──────────────────────────────────────────────────────────
  admin:
    image: ${OPENPALM_IMAGE_NAMESPACE:-openpalm}/admin:${OPENPALM_IMAGE_TAG:-latest}
    restart: unless-stopped
    init: true
    user: "${OPENPALM_UID:-1000}:${OPENPALM_GID:-1000}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:${OPENPALM_ADMIN_PORT:-3880}:8100"
      - "${OPENPALM_ADMIN_OPENCODE_BIND_ADDRESS:-127.0.0.1}:${OPENPALM_ADMIN_OPENCODE_PORT:-3881}:4097"
    environment:
      PORT: "8100"
      HOME: /home/node
      OPENPALM_HOME: /openpalm
      ADMIN_TOKEN: ${OPENPALM_ADMIN_TOKEN:-}
      MEMORY_AUTH_TOKEN: ${MEMORY_AUTH_TOKEN:-}
      MEMORY_API_URL: http://memory:8765
      MEMORY_USER_ID: ${MEMORY_USER_ID:-default_user}
      GUARDIAN_URL: http://guardian:8080
      OPENPALM_ASSISTANT_URL: http://assistant:4096
      OPENPALM_ADMIN_API_URL: http://localhost:8100
      # OpenCode instance for admin AI assistant
      OPENCODE_CONFIG_DIR: /home/node
      OPENCODE_PORT: "4097"
      OPENCODE_AUTH: "false"
      # LLM provider keys — admin's OpenCode reads from vault mount
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      # Docker API via socket proxy
      DOCKER_HOST: tcp://docker-socket-proxy:2375
    volumes:
      - ${OPENPALM_HOME}:/openpalm
      - ${OPENPALM_HOME}/data/admin:/home/node
      - ${OPENPALM_HOME}/data/workspace:/work
      - ${HOME}/.cache/openpalm/registry:/cache/registry
    networks: [ assistant_net, admin_docker_net ]
    depends_on:
      docker-socket-proxy:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:8100/ || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  admin_docker_net: # Isolated: only admin + docker-socket-proxy
