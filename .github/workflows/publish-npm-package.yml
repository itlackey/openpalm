name: Publish npm package
# Reusable workflow for independently versioned channel packages
# (channel-api, channel-discord, channel-slack, channel-voice).
# Platform-coupled packages (lib, CLI, channels-sdk) ship via release.yml.

on:
  workflow_call:
    inputs:
      package-dir:
        required: true
        type: string
      package-name:
        required: true
        type: string
      needs-build:
        required: false
        type: boolean
        default: false
      version:
        description: 'Explicit version or bump keyword (e.g. 1.2.0, minor, prerelease). Empty = auto patch bump.'
        required: false
        type: string
        default: ''

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Resolve version
        working-directory: ${{ inputs.package-dir }}
        env:
          EXPLICIT_VERSION: ${{ inputs.version }}
        run: |
          CURRENT=$(node -p "require('./package.json').version")

          set_version() {
            node -e "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync('./package.json', 'utf8'));
              pkg.version = process.argv[1];
              fs.writeFileSync('./package.json', JSON.stringify(pkg, null, 2) + '\n');
            " "$1"
          }

          # Compute semver increment using node (avoids npm version which
          # chokes on workspace: protocol refs in the monorepo lockfile)
          bump_version() {
            node -e "
              const cur = process.argv[1], type = process.argv[2];
              const m = cur.match(/^(\d+)\.(\d+)\.(\d+)(?:-(.+))?$/);
              if (!m) { console.error('Cannot parse version: ' + cur); process.exit(1); }
              let [, ma, mi, pa, pre] = m;
              ma = +ma; mi = +mi; pa = +pa;
              switch (type) {
                case 'major':      console.log(ma+1+'.0.0'); break;
                case 'minor':      console.log(ma+'.'+(mi+1)+'.0'); break;
                case 'patch':      console.log(pre ? ma+'.'+mi+'.'+pa : ma+'.'+mi+'.'+(pa+1)); break;
                case 'prerelease': {
                  if (pre) {
                    const parts = pre.split('.');
                    const last = parseInt(parts[parts.length-1]);
                    if (!isNaN(last)) { parts[parts.length-1] = String(last+1); }
                    else { parts.push('0'); }
                    console.log(ma+'.'+mi+'.'+pa+'-'+parts.join('.'));
                  } else {
                    console.log(ma+'.'+mi+'.'+(pa+1)+'-0');
                  }
                  break;
                }
                default: console.error('Unknown bump type: '+type); process.exit(1);
              }
            " "$1" "$2"
          }

          if [ -n "${EXPLICIT_VERSION}" ]; then
            case "${EXPLICIT_VERSION}" in
              major|minor|patch|prerelease)
                NEW=$(bump_version "${CURRENT}" "${EXPLICIT_VERSION}")
                ;;
              *)
                NEW="${EXPLICIT_VERSION}"
                ;;
            esac
            set_version "${NEW}"
            echo "Set ${{ inputs.package-name }} from ${CURRENT} to ${NEW}"
            echo "BUMPED=true" >> "$GITHUB_ENV"
          elif npm view "${{ inputs.package-name }}@${CURRENT}" version 2>/dev/null; then
            NEW=$(bump_version "${CURRENT}" "patch")
            set_version "${NEW}"
            echo "Bumped ${{ inputs.package-name }} from ${CURRENT} to ${NEW}"
            echo "BUMPED=true" >> "$GITHUB_ENV"
          fi

      - name: Refresh Bun lockfile workspace metadata
        run: |
          bun update --lockfile-only
          if git diff --quiet -- bun.lock; then
            echo "LOCKFILE_CHANGED=false" >> "$GITHUB_ENV"
          else
            echo "LOCKFILE_CHANGED=true" >> "$GITHUB_ENV"
          fi

      - name: Build
        if: inputs.needs-build
        working-directory: ${{ inputs.package-dir }}
        run: bun run build

      - name: Pack with Bun
        working-directory: ${{ inputs.package-dir }}
        shell: bash
        run: |
          PACK_DIR="$(mktemp -d)"
          bun pm pack --destination "${PACK_DIR}" --quiet
          mapfile -t TARBALLS < <(find "${PACK_DIR}" -maxdepth 1 -name '*.tgz')
          if [ "${#TARBALLS[@]}" -ne 1 ]; then
            echo "::error::Expected exactly one tarball in ${PACK_DIR}, found ${#TARBALLS[@]}"
            exit 1
          fi
          TARBALL_PATH="${TARBALLS[0]}"
          echo "TARBALL=${TARBALL_PATH}" >> "$GITHUB_ENV"
          echo "Packed: ${TARBALL_PATH}"

      - name: Publish with npm
        working-directory: ${{ inputs.package-dir }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG_ARGS=""
          if echo "${VERSION}" | grep -qE -- '-'; then
            TAG_ARGS="--tag next"
          fi
          npm publish "${TARBALL}" --provenance --access public ${TAG_ARGS} || {
            EXIT_CODE=$?
            # Treat "already published" as success so version bump commit still happens
            if npm view "${{ inputs.package-name }}@${VERSION}" version 2>/dev/null; then
              echo "::warning::Version ${VERSION} already published — skipping"
            else
              exit $EXIT_CODE
            fi
          }

      - name: Commit version bump
        if: env.BUMPED == 'true' || env.LOCKFILE_CHANGED == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          VERSION="$(node -p "require('./${{ inputs.package-dir }}/package.json').version")"
          if [ "${BUMPED:-false}" = 'true' ] && [ "${LOCKFILE_CHANGED}" = 'true' ]; then
            COMMIT_MESSAGE="chore(${{ inputs.package-name }}): bump to ${VERSION} and sync lockfile"
          elif [ "${BUMPED:-false}" = 'true' ]; then
            COMMIT_MESSAGE="chore(${{ inputs.package-name }}): bump to ${VERSION}"
          else
            COMMIT_MESSAGE="chore(${{ inputs.package-name }}): sync lockfile for ${VERSION}"
          fi
          git add "${{ inputs.package-dir }}/package.json" bun.lock
          git commit -m "${COMMIT_MESSAGE}"
          # Retry with rebase to handle concurrent publish workflows
          for i in 1 2 3 4 5; do
            git pull --rebase origin "${{ github.ref_name }}" && git push && exit 0
            echo "Push attempt $i failed, retrying in $((i * 2))s..."
            sleep $((i * 2))
          done
          echo "::warning::Version bump commit failed after 5 attempts (package was published successfully)"
