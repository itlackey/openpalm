name: Publish npm package

on:
  workflow_call:
    inputs:
      package-dir:
        required: true
        type: string
      package-name:
        required: true
        type: string
      needs-build:
        required: false
        type: boolean
        default: false
      version:
        description: 'Explicit version or bump keyword (e.g. 1.2.0, minor, prerelease). Empty = auto patch bump.'
        required: false
        type: string
        default: ''

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Resolve version
        working-directory: ${{ inputs.package-dir }}
        env:
          EXPLICIT_VERSION: ${{ inputs.version }}
        run: |
          CURRENT=$(node -p "require('./package.json').version")

          set_version() {
            node -e "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync('./package.json', 'utf8'));
              pkg.version = process.argv[1];
              fs.writeFileSync('./package.json', JSON.stringify(pkg, null, 2) + '\n');
            " "$1"
          }

          # Compute semver increment using node (avoids npm version which
          # chokes on workspace: protocol refs in the monorepo lockfile)
          bump_version() {
            node -e "
              const cur = process.argv[1], type = process.argv[2];
              const m = cur.match(/^(\d+)\.(\d+)\.(\d+)(?:-(.+))?$/);
              if (!m) { console.error('Cannot parse version: ' + cur); process.exit(1); }
              let [, ma, mi, pa, pre] = m;
              ma = +ma; mi = +mi; pa = +pa;
              switch (type) {
                case 'major':      console.log(ma+1+'.0.0'); break;
                case 'minor':      console.log(ma+'.'+(mi+1)+'.0'); break;
                case 'patch':      console.log(pre ? ma+'.'+mi+'.'+pa : ma+'.'+mi+'.'+(pa+1)); break;
                case 'prerelease': {
                  if (pre) {
                    const parts = pre.split('.');
                    const last = parseInt(parts[parts.length-1]);
                    if (!isNaN(last)) { parts[parts.length-1] = String(last+1); }
                    else { parts.push('0'); }
                    console.log(ma+'.'+mi+'.'+pa+'-'+parts.join('.'));
                  } else {
                    console.log(ma+'.'+mi+'.'+(pa+1)+'-0');
                  }
                  break;
                }
                default: console.error('Unknown bump type: '+type); process.exit(1);
              }
            " "$1" "$2"
          }

          if [ -n "${EXPLICIT_VERSION}" ]; then
            case "${EXPLICIT_VERSION}" in
              major|minor|patch|prerelease)
                NEW=$(bump_version "${CURRENT}" "${EXPLICIT_VERSION}")
                ;;
              *)
                NEW="${EXPLICIT_VERSION}"
                ;;
            esac
            set_version "${NEW}"
            echo "Set ${{ inputs.package-name }} from ${CURRENT} to ${NEW}"
            echo "BUMPED=true" >> "$GITHUB_ENV"
          elif npm view "${{ inputs.package-name }}@${CURRENT}" version 2>/dev/null; then
            NEW=$(bump_version "${CURRENT}" "patch")
            set_version "${NEW}"
            echo "Bumped ${{ inputs.package-name }} from ${CURRENT} to ${NEW}"
            echo "BUMPED=true" >> "$GITHUB_ENV"
          fi

      - name: Build
        if: inputs.needs-build
        working-directory: ${{ inputs.package-dir }}
        run: bun run build

      - name: Pack with Bun
        working-directory: ${{ inputs.package-dir }}
        run: |
          TARBALL=$(bun pm pack --quiet 2>&1 | tail -1)
          echo "TARBALL=${TARBALL}" >> "$GITHUB_ENV"
          echo "Packed: ${TARBALL}"

      - name: Normalize workspace refs in tarball
        working-directory: ${{ github.workspace }}
        run: |
          WORKDIR=$(mktemp -d)
          PATCHED_TARBALL="${WORKDIR}/$(basename "${TARBALL}")"
          trap 'rm -rf "${WORKDIR}"' EXIT

          tar -xzf "${TARBALL}" -C "${WORKDIR}"

          node --input-type=module - "${WORKDIR}/package/package.json" <<'NODE'
          import fs from 'node:fs';
          import path from 'node:path';

          const manifestPath = process.argv[2];
          let rootPackage;
          try {
            rootPackage = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          } catch (error) {
            const message = error instanceof Error ? error.message : String(error);
            throw new Error(`Failed to read ${path.resolve('package.json')}: ${message}`);
          }
          const workspaceVersions = new Map();

          for (const workspacePath of rootPackage.workspaces ?? []) {
            const workspaceManifestPath = path.join(workspacePath, 'package.json');
            if (!fs.existsSync(workspaceManifestPath)) continue;

            let workspaceManifest;
            try {
              workspaceManifest = JSON.parse(fs.readFileSync(workspaceManifestPath, 'utf8'));
            } catch (error) {
              const message = error instanceof Error ? error.message : String(error);
              throw new Error(`Failed to read ${path.resolve(workspaceManifestPath)}: ${message}`);
            }
            if (workspaceManifest.name && workspaceManifest.version) {
              workspaceVersions.set(workspaceManifest.name, workspaceManifest.version);
            }
          }

          const resolveWorkspaceVersion = (name, spec) => {
            const version = workspaceVersions.get(name);
            if (!version) {
              throw new Error(`Missing workspace version for ${name}`);
            }

            const suffix = spec.slice('workspace:'.length);
            if (!suffix || suffix === '*') return version;
            if (suffix === '^' || suffix === '~') return `${suffix}${version}`;
            if (suffix === version || suffix === `^${version}` || suffix === `~${version}`) return suffix;
            throw new Error(`Unsupported workspace spec ${spec} for ${name}`);
          };

          let manifest;
          try {
            manifest = JSON.parse(fs.readFileSync(manifestPath, 'utf8'));
          } catch (error) {
            const message = error instanceof Error ? error.message : String(error);
            throw new Error(`Failed to read ${path.resolve(manifestPath)}: ${message}`);
          }
          let changed = false;

          for (const field of ['dependencies', 'devDependencies', 'optionalDependencies', 'peerDependencies']) {
            const deps = manifest[field];
            if (!deps) continue;

            for (const [name, spec] of Object.entries(deps)) {
              if (typeof spec !== 'string' || !spec.startsWith('workspace:')) continue;
              deps[name] = resolveWorkspaceVersion(name, spec);
              changed = true;
            }
          }

          if (changed) {
            fs.writeFileSync(manifestPath, JSON.stringify(manifest, null, 2) + '\n');
          }
          NODE

          tar -czf "${PATCHED_TARBALL}" -C "${WORKDIR}" package
          echo "TARBALL=${PATCHED_TARBALL}" >> "$GITHUB_ENV"
          echo "Patched: ${PATCHED_TARBALL}"

      - name: Publish with npm
        working-directory: ${{ inputs.package-dir }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG_ARGS=""
          if echo "${VERSION}" | grep -qE -- '-'; then
            TAG_ARGS="--tag next"
          fi
          npm publish "${TARBALL}" --provenance --access public ${TAG_ARGS} || {
            EXIT_CODE=$?
            # Treat "already published" as success so version bump commit still happens
            if npm view "${{ inputs.package-name }}@${VERSION}" version 2>/dev/null; then
              echo "::warning::Version ${VERSION} already published — skipping"
            else
              exit $EXIT_CODE
            fi
          }

      - name: Commit version bump
        if: env.BUMPED == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ inputs.package-dir }}/package.json"
          git commit -m "chore(${{ inputs.package-name }}): bump to $(node -p "require('./${{ inputs.package-dir }}/package.json').version")"
          # Retry with rebase to handle concurrent publish workflows
          for i in 1 2 3 4 5; do
            git pull --rebase origin "${{ github.ref_name }}" && git push && exit 0
            echo "Push attempt $i failed, retrying in $((i * 2))s..."
            sleep $((i * 2))
          done
          echo "::warning::Version bump commit failed after 5 attempts (package was published successfully)"
