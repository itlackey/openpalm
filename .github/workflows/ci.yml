name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gates:
    name: Quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for leaked API keys
        # CI has no real secrets, so varlock scan has nothing to resolve.
        # Use grep patterns on the PR diff for provider-specific key formats.
        # Developers get full varlock scan coverage via the pre-commit hook
        # (install with ./scripts/install-hooks.sh + openpalm validate).
        # Patterns: OpenAI (sk-*), Groq (gsk_*), Google (AIza*), 64-char hex tokens.
        run: |
          set -euo pipefail
          EVENT_NAME="${{ github.event_name }}"

          if [ "$EVENT_NAME" = "pull_request" ]; then
            BASE_REF="${{ github.base_ref || 'main' }}"
            git fetch origin "${BASE_REF}" --depth=1
            DIFF_RANGE="origin/${BASE_REF}...HEAD"
          else
            BEFORE="${{ github.event.before }}"
            SHA="${{ github.sha }}"
            if [ -n "$BEFORE" ] && [ "$BEFORE" != "0000000000000000000000000000000000000000" ]; then
              DIFF_RANGE="${BEFORE}...${SHA}"
            else
              # Initial commit or force-push with no 'before' — scan last commit
              DIFF_RANGE="HEAD~1...HEAD"
            fi
          fi

          if git diff "$DIFF_RANGE" --unified=0 \
              | grep '^+' | grep -v '^+++' \
              | grep -vi 'sha256\|sha_256\|checksum\|digest' \
              | grep -qE '(sk-[A-Za-z0-9]{20,}|gsk_[A-Za-z0-9]{30,}|AIza[A-Za-z0-9_-]{35}|(^|[^0-9a-f])[0-9a-f]{64}([^0-9a-f]|$))'; then
            echo "::error::Potential API key or secret detected in PR diff"
            exit 1
          fi
          echo "No obvious API key patterns found."

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Bun workspace dependencies
        run: bun install --frozen-lockfile

      - name: Type check admin UI
        run: cd packages/admin && bun run check

      - name: Test (sdk + guardian + channels)
        run: bun run test

      - name: Validate Docker Compose manifests
        env:
          ADMIN_TOKEN: ci-placeholder
        run: docker compose -f assets/docker-compose.yml -f compose.dev.yaml config -q

      - name: Validate registry YAML files
        run: |
          set -euo pipefail
          pip install --quiet PyYAML
          errors=0

          # Validate all registry channel YAML files
          for f in registry/channels/*.yml; do
            if [ ! -f "$f" ]; then continue; fi
            if ! docker compose -f assets/docker-compose.yml -f "$f" config -q 2>/dev/null; then
              echo "::error file=$f::Invalid compose overlay: $f"
              errors=$((errors + 1))
            fi
          done

          # Validate all registry automation YAML files are well-formed
          for f in registry/automations/*.yml; do
            if [ ! -f "$f" ]; then continue; fi
            # Automations are plain YAML — validate with a quick parse
            if ! python3 -c "import yaml, sys; yaml.safe_load(open(sys.argv[1]))" "$f" 2>/dev/null; then
              echo "::error file=$f::Invalid YAML: $f"
              errors=$((errors + 1))
            fi
          done

          if [ "$errors" -gt 0 ]; then
            echo "::error::$errors registry file(s) failed validation"
            exit 1
          fi
          echo "All registry files validated successfully"
