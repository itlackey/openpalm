name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - 'release/**'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gates:
    name: Quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for leaked API keys
        # CI has no real secrets, so varlock scan has nothing to resolve.
        # Use grep patterns on the PR diff for provider-specific key formats.
        # Developers get full varlock scan coverage via the pre-commit hook
        # (install with ./scripts/install-hooks.sh + openpalm install).
        # Patterns: OpenAI (sk-*), Groq (gsk_*), Google (AIza*), 64-char hex tokens.
        run: |
          set -euo pipefail
          EVENT_NAME="${{ github.event_name }}"

          if [ "$EVENT_NAME" = "pull_request" ]; then
            BASE_REF="${{ github.base_ref || 'main' }}"
            git fetch origin "${BASE_REF}" --depth=1
            DIFF_RANGE="origin/${BASE_REF}...HEAD"
          else
            BEFORE="${{ github.event.before }}"
            SHA="${{ github.sha }}"
            if [ -n "$BEFORE" ] && [ "$BEFORE" != "0000000000000000000000000000000000000000" ]; then
              DIFF_RANGE="${BEFORE}...${SHA}"
            else
              # Initial commit or force-push with no 'before' — scan last commit
              if git rev-parse HEAD~1 >/dev/null 2>&1; then
                DIFF_RANGE="HEAD~1...HEAD"
              else
                echo "Single-commit history — scanning full HEAD"
                DIFF_RANGE="HEAD"
              fi
            fi
          fi

          if git diff "$DIFF_RANGE" --unified=0 \
              | grep '^+' | grep -v '^+++' \
              | grep -viE 'sha256|sha_256|checksum|digest|\.tar\.gz|VARLOCK_CHECKSUMS' \
              | grep -qE '(sk-[A-Za-z0-9]{20,}|gsk_[A-Za-z0-9]{30,}|AIza[A-Za-z0-9_-]{35}|(^|[^0-9a-f])[0-9a-f]{64}([^0-9a-f]|$))'; then
            echo "::error::Potential API key or secret detected in PR diff"
            exit 1
          fi
          echo "No obvious API key patterns found."

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Bun workspace dependencies
        run: bun install --frozen-lockfile

      - name: Type check admin UI
        run: cd packages/admin && bun run check

      - name: Test (sdk + guardian + channels)
        run: |
          set -euo pipefail
          for attempt in 1 2; do
            if bun run test; then
              exit 0
            fi

            if [ "${attempt}" -eq 2 ]; then
              echo "::error::bun run test failed after ${attempt} attempts"
              exit 1
            fi

            echo "::warning::bun run test failed on attempt ${attempt}. Retrying..."
          done

      - name: Validate Docker Compose manifests
        env:
          ADMIN_TOKEN: ci-placeholder
          OP_HOME: ${{ github.workspace }}/.op-home
        run: |
          set -euo pipefail
          mkdir -p "${OP_HOME}/vault/stack" "${OP_HOME}/vault/user" "${OP_HOME}/data" "${OP_HOME}/config" "${OP_HOME}/logs" "${OP_HOME}/stack"
          docker compose -f .openpalm/stack/core.compose.yml -f compose.dev.yml config -q

      - name: Assert deleted scripts are absent
        run: |
          set -euo pipefail
          # start.sh was deleted in P1-5 (0.10.0 cleanup). Prevent reintroduction.
          if [ -f ".openpalm/stack/start.sh" ]; then
            echo "::error file=.openpalm/stack/start.sh::.openpalm/stack/start.sh must not exist — deleted in P1-5 cleanup"
            exit 1
          fi
          echo "Deleted script assertion passed"

      - name: Validate shipped addon catalog and automations
        run: |
          set -euo pipefail

          # Full addon validation (compose.yml + .env.schema + conventions)
          ./scripts/validate-registry.sh

          # Also validate catalog automation YAML files are well-formed
          pip install --quiet PyYAML
          errors=0
          for f in .openpalm/registry/automations/*.yml; do
            if [ ! -f "$f" ]; then continue; fi
            if ! python3 -c "import yaml, sys; yaml.safe_load(open(sys.argv[1]))" "$f" 2>/dev/null; then
              echo "::error file=$f::Invalid YAML: $f"
              errors=$((errors + 1))
            fi
          done

          if [ "$errors" -gt 0 ]; then
            echo "::error::$errors catalog file(s) failed validation"
            exit 1
          fi
          echo "All stack files validated successfully"

      - name: Validate platform version sync
        run: |
          set -euo pipefail
          ROOT_VERSION=$(jq -r .version package.json)
          PLATFORM_MANIFESTS="packages/lib/package.json packages/admin/package.json core/guardian/package.json packages/cli/package.json packages/channels-sdk/package.json"
          errors=0

          for pkg in ${PLATFORM_MANIFESTS}; do
            PKG_VERSION=$(jq -r .version "${pkg}")
            if [ "${PKG_VERSION}" != "${ROOT_VERSION}" ]; then
              echo "::error file=${pkg}::${pkg} version ${PKG_VERSION} does not match root ${ROOT_VERSION}"
              errors=$((errors + 1))
            fi
          done

          # Validate setup script versions match
          SCRIPT_VERSION=$(grep -oP '^SCRIPT_VERSION="\K[^"]+' scripts/setup.sh || true)
          if [ -n "${SCRIPT_VERSION}" ] && [ "${SCRIPT_VERSION}" != "${ROOT_VERSION}" ]; then
            echo "::error file=scripts/setup.sh::setup.sh SCRIPT_VERSION ${SCRIPT_VERSION} does not match root ${ROOT_VERSION}"
            errors=$((errors + 1))
          fi

          PS1_VERSION=$(grep -oP "^\\\$ScriptVersion = '\K[^']+" scripts/setup.ps1 || true)
          if [ -n "${PS1_VERSION}" ] && [ "${PS1_VERSION}" != "${ROOT_VERSION}" ]; then
            echo "::error file=scripts/setup.ps1::setup.ps1 ScriptVersion ${PS1_VERSION} does not match root ${ROOT_VERSION}"
            errors=$((errors + 1))
          fi

          if [ "$errors" -gt 0 ]; then
            echo "::error::${errors} platform version(s) out of sync with root ${ROOT_VERSION}"
            exit 1
          fi
          echo "All platform versions match: ${ROOT_VERSION}"

  admin-unit-tests:
    name: Admin unit tests (Vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Bun workspace dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers (for Vitest browser mode)
        run: npx playwright install --with-deps chromium

      - name: Run admin unit tests
        run: bun run admin:test:unit

  admin-e2e-mocked:
    name: Admin mocked E2E tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Bun workspace dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run mocked Playwright E2E tests
        run: bun run admin:test:e2e:mocked
