name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gates:
    name: Quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Bun workspace dependencies
        run: bun install --frozen-lockfile

      - name: Type check admin UI
        run: cd core/admin && bun run check

      - name: Test (sdk + guardian + channels)
        run: bun run test

      - name: Validate Docker Compose manifests
        env:
          ADMIN_TOKEN: ci-placeholder
          POSTGRES_PASSWORD: ci-placeholder
        run: docker compose -f core/assets/docker-compose.yml -f docker-compose.override.yml config -q
      - name: Validate changeset for package changes
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch origin "${BASE_REF}" --depth=1
          CHANGED_FILES=$(git diff --name-only "origin/${BASE_REF}...HEAD")

          if ! echo "${CHANGED_FILES}" | grep -Eq '^packages/(channels-sdk|assistant-tools|channel-(chat|api|discord))/'; then
            echo "No publishable package changes detected."
            exit 0
          fi

          if echo "${CHANGED_FILES}" | grep -Eq '^\.changeset/.+\.md$'; then
            echo "Changeset detected."
            exit 0
          fi

          echo "Publishable package changes detected, but no .changeset/*.md file was added."
          echo "Run 'bun run changeset' and commit the generated changeset file."
          exit 1
