name: Publish @openpalm/lib
on:
  push:
    branches: [main]
    paths: ['packages/lib/**']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 1.2.0, minor, prerelease). Leave empty for auto patch bump.'
        required: false
        type: string
permissions:
  contents: write
  id-token: write

jobs:
  publish:
    uses: ./.github/workflows/publish-npm-package.yml
    with:
      package-dir: packages/lib
      package-name: '@openpalm/lib'
      needs-build: false
      version: ${{ inputs.version || '' }}
