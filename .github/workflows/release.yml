name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.2.0). Used to create and push tag v<version> from current branch.'
        required: true
        type: string

permissions:
  contents: write
  packages: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare-tag:
    name: Prepare release tag
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      version: ${{ steps.resolve.outputs.version }}
      prerelease: ${{ steps.resolve.outputs.prerelease }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Resolve release tag
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [ "${EVENT_NAME}" = 'push' ]; then
            TAG="${REF_NAME}"
          else
            VERSION="${INPUT_VERSION}"
            if ! echo "${VERSION}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$'; then
              echo 'Invalid version. Must be semver like 1.2.3 or 1.2.3-rc1.'
              exit 1
            fi

            TAG="v${VERSION}"
          fi

          VERSION="${TAG#v}"
          if ! echo "${VERSION}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$'; then
            echo "Invalid tag ${TAG}. Must be semver like v1.2.3 or v1.2.3-rc1."
            exit 1
          fi
          if echo "${VERSION}" | grep -Eq -- '-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*$'; then
            PRERELEASE='true'
          else
            PRERELEASE='false'
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${PRERELEASE}" >> "$GITHUB_OUTPUT"

      - name: Prepare platform release state
        env:
          VERSION: ${{ steps.resolve.outputs.version }}
          EVENT_NAME: ${{ github.event_name }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          PLATFORM_MANIFESTS="package.json packages/admin/package.json core/guardian/package.json packages/cli/package.json packages/channels-sdk/package.json"

          if [ "${EVENT_NAME}" = 'workflow_dispatch' ]; then
            BRANCH="${GITHUB_REF_NAME}"

            # Ensure we are on the branch (workflow dispatch can start from any ref)
            git checkout "${BRANCH}"
            git pull --ff-only origin "${BRANCH}"

            for pkg in ${PLATFORM_MANIFESTS}; do
              jq --arg v "${VERSION}" '.version = $v' "${pkg}" > "${pkg}.tmp" && mv "${pkg}.tmp" "${pkg}"
              echo "Set ${pkg} to ${VERSION}"
            done

            # Stamp install scripts to the platform release tag.
            sed -i "s/^SCRIPT_VERSION=\".*\"/SCRIPT_VERSION=\"${VERSION}\"/" scripts/setup.sh
            sed -i "s/^\\\$ScriptVersion = '.*'/\$ScriptVersion = '${VERSION}'/" scripts/setup.ps1
            echo "Stamped SCRIPT_VERSION=${VERSION} into setup scripts"

            if git diff --quiet -- package.json packages/admin/package.json core/guardian/package.json packages/cli/package.json packages/channels-sdk/package.json scripts/setup.sh scripts/setup.ps1; then
              echo "Release files already match ${VERSION}, skipping commit."
              exit 0
            fi

            git add package.json packages/admin/package.json core/guardian/package.json packages/cli/package.json packages/channels-sdk/package.json scripts/setup.sh scripts/setup.ps1
            git commit -m "chore: bump platform version to ${VERSION}"
            git push origin "${BRANCH}"
            exit 0
          fi

          for pkg in ${PLATFORM_MANIFESTS}; do
            CURRENT=$(jq -r .version "${pkg}")
            if [ "${CURRENT}" != "${VERSION}" ]; then
              echo "${pkg} version ${CURRENT} does not match release ${VERSION}."
              echo 'Create the tag from a commit with synchronized platform versions.'
              exit 1
            fi
          done

          if ! grep -Eq '^SCRIPT_VERSION="'"${VERSION}"'"$' scripts/setup.sh; then
            echo "scripts/setup.sh SCRIPT_VERSION does not match release ${VERSION}."
            exit 1
          fi

          if ! grep -Eq "^\\\$ScriptVersion = '${VERSION}'$" scripts/setup.ps1; then
            echo "scripts/setup.ps1 ScriptVersion does not match release ${VERSION}."
            exit 1
          fi

          echo "Release tag ${VERSION} matches platform manifests and setup scripts."

      - name: Create and push tag
        if: github.event_name == 'workflow_dispatch'
        env:
          TAG: ${{ steps.resolve.outputs.tag }}
          EVENT_NAME: ${{ github.event_name }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          if [ "${EVENT_NAME}" = 'workflow_dispatch' ]; then
            BRANCH="${GITHUB_REF_NAME}"
          else
            BRANCH="${DEFAULT_BRANCH}"
          fi

          # Point tag at the latest commit (which includes the version bump)
          git checkout "${BRANCH}"
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"

  push-images:
    name: Build and push Docker images
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: prepare-tag
    strategy:
      fail-fast: true
      matrix:
        include:
          - dockerfile: core/admin/Dockerfile
            image: openpalm/admin
          - dockerfile: core/guardian/Dockerfile
            image: openpalm/guardian
          - dockerfile: core/channel/Dockerfile
            image: openpalm/channel
          - dockerfile: core/assistant/Dockerfile
            image: openpalm/assistant
          - dockerfile: core/memory/Dockerfile
            image: openpalm/memory
          - dockerfile: core/scheduler/Dockerfile
            image: openpalm/scheduler

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-tag.outputs.tag }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          context: git
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable=${{ needs.prepare-tag.outputs.prerelease != 'true' }}
            type=raw,value=v${{ needs.prepare-tag.outputs.version }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max

  build-cli-artifacts:
    name: Build CLI artifacts
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    needs: prepare-tag
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-latest
            script: build:linux-x64
            artifact: openpalm-cli-linux-x64
          - os: ubuntu-latest
            script: build:linux-arm64
            artifact: openpalm-cli-linux-arm64
          - os: macos-latest
            script: build:darwin-x64
            artifact: openpalm-cli-darwin-x64
          - os: macos-latest
            script: build:darwin-arm64
            artifact: openpalm-cli-darwin-arm64
          - os: windows-latest
            script: build:windows-x64
            artifact: openpalm-cli-windows-x64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-tag.outputs.tag }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build CLI binary
        run: bun run --cwd packages/cli ${{ matrix.script }}

      - name: Ad-hoc codesign (macOS)
        if: runner.os == 'macOS'
        run: codesign --force --sign - packages/cli/dist/${{ matrix.artifact }}

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: packages/cli/dist/${{ matrix.artifact }}

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - prepare-tag
      - push-images
      - build-cli-artifacts

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-tag.outputs.tag }}

      - name: Build release artifact bundle
        run: |
          mkdir -p dist
          tar -czf dist/openpalm-${{ needs.prepare-tag.outputs.version }}-deploy-bundle.tar.gz \
            .openpalm \
            core \
            packages \
            scripts \
            README.md

      - name: Download CLI artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: openpalm-cli-*
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums-sha256.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-tag.outputs.tag }}
          name: OpenPalm ${{ needs.prepare-tag.outputs.tag }}
          prerelease: ${{ needs.prepare-tag.outputs.prerelease == 'true' }}
          generate_release_notes: true
          body: |
            ## Docker Images

            | Image | Pull command |
            |---|---|
            | [openpalm/admin](https://hub.docker.com/r/openpalm/admin) | `docker pull openpalm/admin:v${{ needs.prepare-tag.outputs.version }}` |
            | [openpalm/guardian](https://hub.docker.com/r/openpalm/guardian) | `docker pull openpalm/guardian:v${{ needs.prepare-tag.outputs.version }}` |
            | [openpalm/channel](https://hub.docker.com/r/openpalm/channel) | `docker pull openpalm/channel:v${{ needs.prepare-tag.outputs.version }}` |
            | [openpalm/assistant](https://hub.docker.com/r/openpalm/assistant) | `docker pull openpalm/assistant:v${{ needs.prepare-tag.outputs.version }}` |
            | [openpalm/memory](https://hub.docker.com/r/openpalm/memory) | `docker pull openpalm/memory:v${{ needs.prepare-tag.outputs.version }}` |
            | [openpalm/scheduler](https://hub.docker.com/r/openpalm/scheduler) | `docker pull openpalm/scheduler:v${{ needs.prepare-tag.outputs.version }}` |

            ## npm Packages

            ```bash
            bun install -g openpalm@${{ needs.prepare-tag.outputs.version }}
            bun add @openpalm/channels-sdk@${{ needs.prepare-tag.outputs.version }}
            ```

            ## Quick Install

            ```bash
            curl -fsSL https://raw.githubusercontent.com/itlackey/openpalm/v${{ needs.prepare-tag.outputs.version }}/scripts/setup.sh | bash
            ```

            ## What's Changed
          files: |
            dist/openpalm-${{ needs.prepare-tag.outputs.version }}-deploy-bundle.tar.gz
            dist/checksums-sha256.txt
            dist/openpalm-cli-linux-x64
            dist/openpalm-cli-linux-arm64
            dist/openpalm-cli-darwin-x64
            dist/openpalm-cli-darwin-arm64
            dist/openpalm-cli-windows-x64.exe

  publish-cli-npm:
    name: Publish CLI to npm
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - prepare-tag
      - release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-tag.outputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Pack CLI
        working-directory: packages/cli
        run: |
          PACK_DIR="$(mktemp -d)"
          bun pm pack --destination "${PACK_DIR}" --quiet
          mapfile -t TARBALLS < <(find "${PACK_DIR}" -maxdepth 1 -name '*.tgz')
          if [ "${#TARBALLS[@]}" -ne 1 ]; then
            echo "::error::Expected exactly one tarball, found ${#TARBALLS[@]}"
            exit 1
          fi
          echo "TARBALL=${TARBALLS[0]}" >> "$GITHUB_ENV"
          echo "Packed: ${TARBALLS[0]}"

      - name: Publish to npm
        working-directory: packages/cli
        run: |
          VERSION="${{ needs.prepare-tag.outputs.version }}"
          TAG_ARGS=""
          if [ "${{ needs.prepare-tag.outputs.prerelease }}" = "true" ]; then
            TAG_ARGS="--tag next"
          fi
          npm publish "${TARBALL}" --provenance --access public ${TAG_ARGS} || {
            EXIT_CODE=$?
            if npm view "openpalm@${VERSION}" version 2>/dev/null; then
              echo "::warning::Version ${VERSION} already published — skipping"
            else
              exit $EXIT_CODE
            fi
          }

  publish-channels-sdk-npm:
    name: Publish channels-sdk to npm
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - prepare-tag
      - release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-tag.outputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Pack channels-sdk
        working-directory: packages/channels-sdk
        run: |
          PACK_DIR="$(mktemp -d)"
          bun pm pack --destination "${PACK_DIR}" --quiet
          mapfile -t TARBALLS < <(find "${PACK_DIR}" -maxdepth 1 -name '*.tgz')
          if [ "${#TARBALLS[@]}" -ne 1 ]; then
            echo "::error::Expected exactly one tarball, found ${#TARBALLS[@]}"
            exit 1
          fi
          echo "TARBALL=${TARBALLS[0]}" >> "$GITHUB_ENV"
          echo "Packed: ${TARBALLS[0]}"

      - name: Publish to npm
        working-directory: packages/channels-sdk
        run: |
          VERSION="${{ needs.prepare-tag.outputs.version }}"
          TAG_ARGS=""
          if [ "${{ needs.prepare-tag.outputs.prerelease }}" = "true" ]; then
            TAG_ARGS="--tag next"
          fi
          npm publish "${TARBALL}" --provenance --access public ${TAG_ARGS} || {
            EXIT_CODE=$?
            if npm view "@openpalm/channels-sdk@${VERSION}" version 2>/dev/null; then
              echo "::warning::Version ${VERSION} already published — skipping"
            else
              exit $EXIT_CODE
            fi
          }
