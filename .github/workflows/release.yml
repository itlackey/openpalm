name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.2.0). Used to create and push tag v<version> from current branch.'
        required: true
        type: string

permissions:
  contents: write
  packages: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare-tag:
    name: Prepare release tag
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      version: ${{ steps.resolve.outputs.version }}
      prerelease: ${{ steps.resolve.outputs.prerelease }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Resolve release tag
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [ "${EVENT_NAME}" = 'push' ]; then
            TAG="${REF_NAME}"
          else
            VERSION="${INPUT_VERSION}"
            if ! echo "${VERSION}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$'; then
              echo 'Invalid version. Must be semver like 1.2.3 or 1.2.3-rc1.'
              exit 1
            fi

            TAG="v${VERSION}"
          fi

          VERSION="${TAG#v}"
          if ! echo "${VERSION}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$'; then
            echo "Invalid tag ${TAG}. Must be semver like v1.2.3 or v1.2.3-rc1."
            exit 1
          fi
          if echo "${VERSION}" | grep -Eq -- '-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*$'; then
            PRERELEASE='true'
          else
            PRERELEASE='false'
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${PRERELEASE}" >> "$GITHUB_OUTPUT"

      - name: Bump package.json versions
        env:
          VERSION: ${{ steps.resolve.outputs.version }}
          EVENT_NAME: ${{ github.event_name }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          CURRENT=$(jq -r .version package.json)
          if [ "${CURRENT}" = "${VERSION}" ]; then
            echo "Versions already at ${VERSION}, skipping bump."
            exit 0
          fi

          # Determine target branch for the version commit
          if [ "${EVENT_NAME}" = 'workflow_dispatch' ]; then
            BRANCH="${GITHUB_REF_NAME}"
          else
            BRANCH="${DEFAULT_BRANCH}"
          fi

          # Ensure we are on the branch (tag pushes detach HEAD)
          git checkout "${BRANCH}"
          git pull --ff-only origin "${BRANCH}"

          for pkg in package.json core/admin/package.json core/guardian/package.json core/cli/package.json; do
            jq --arg v "${VERSION}" '.version = $v' "${pkg}" > "${pkg}.tmp" && mv "${pkg}.tmp" "${pkg}"
            echo "Bumped ${pkg} to ${VERSION}"
          done

          git add package.json core/*/package.json
          git commit -m "chore: bump version to ${VERSION}"
          git push origin "${BRANCH}"

      - name: Create and push tag
        env:
          TAG: ${{ steps.resolve.outputs.tag }}
          EVENT_NAME: ${{ github.event_name }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          if [ "${EVENT_NAME}" = 'workflow_dispatch' ]; then
            BRANCH="${GITHUB_REF_NAME}"
          else
            BRANCH="${DEFAULT_BRANCH}"
          fi

          # Point tag at the latest commit (which includes the version bump)
          git checkout "${BRANCH}"
          git tag -fa "${TAG}" -m "Release ${TAG}"
          git push --force origin "${TAG}"

  push-images:
    name: Build and push Docker images
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: prepare-tag
    strategy:
      fail-fast: true
      matrix:
        include:
          - dockerfile: core/admin/Dockerfile
            image: openpalm/admin
          - dockerfile: core/guardian/Dockerfile
            image: openpalm/guardian
          - dockerfile: core/channel/Dockerfile
            image: openpalm/channel
          - dockerfile: core/assistant/Dockerfile
            image: openpalm/assistant
          - dockerfile: core/memory-api/Dockerfile
            image: openpalm/memory-api

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-tag.outputs.tag }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          context: git
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable=${{ needs.prepare-tag.outputs.prerelease != 'true' }}
            type=raw,value=v${{ needs.prepare-tag.outputs.version }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max

  build-cli-artifacts:
    name: Build CLI artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: prepare-tag
    strategy:
      fail-fast: true
      matrix:
        include:
          - script: build:linux-x64
            artifact: openpalm-cli-linux-x64
          - script: build:linux-arm64
            artifact: openpalm-cli-linux-arm64
          - script: build:darwin-x64
            artifact: openpalm-cli-darwin-x64
          - script: build:darwin-arm64
            artifact: openpalm-cli-darwin-arm64
          - script: build:windows-x64
            artifact: openpalm-cli-windows-x64.exe
          - script: build:windows-arm64
            artifact: openpalm-cli-windows-arm64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-tag.outputs.tag }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build CLI binary
        run: bun run --cwd core/cli ${{ matrix.script }}

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: core/cli/dist/${{ matrix.artifact }}

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - prepare-tag
      - push-images
      - build-cli-artifacts

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-tag.outputs.tag }}

      - name: Build release artifact bundle
        run: |
          mkdir -p dist
          tar -czf dist/openpalm-${{ needs.prepare-tag.outputs.version }}-deploy-bundle.tar.gz \
            core \
            packages \
            registry \
            scripts \
            README.md

      - name: Download CLI artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: openpalm-cli-*
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums-sha256.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-tag.outputs.tag }}
          name: OpenPalm ${{ needs.prepare-tag.outputs.tag }}
          prerelease: ${{ needs.prepare-tag.outputs.prerelease == 'true' }}
          generate_release_notes: true
          body: |
            ## Docker Images

            | Image | Pull command |
            |---|---|
            | [openpalm/admin](https://hub.docker.com/r/openpalm/admin) | `docker pull openpalm/admin:v${{ needs.prepare-tag.outputs.version }}` |
            | [openpalm/guardian](https://hub.docker.com/r/openpalm/guardian) | `docker pull openpalm/guardian:v${{ needs.prepare-tag.outputs.version }}` |
            | [openpalm/channel](https://hub.docker.com/r/openpalm/channel) | `docker pull openpalm/channel:v${{ needs.prepare-tag.outputs.version }}` |
            | [openpalm/assistant](https://hub.docker.com/r/openpalm/assistant) | `docker pull openpalm/assistant:v${{ needs.prepare-tag.outputs.version }}` |
            | [openpalm/memory-api](https://hub.docker.com/r/openpalm/memory-api) | `docker pull openpalm/memory-api:v${{ needs.prepare-tag.outputs.version }}` |

            ## npm Packages

            npm packages are versioned and published on an independent release cycle
            via per-package publish workflows.

            - [@openpalm/channels-sdk](https://www.npmjs.com/package/@openpalm/channels-sdk)
            - [@openpalm/channel-chat](https://www.npmjs.com/package/@openpalm/channel-chat)
            - [@openpalm/channel-api](https://www.npmjs.com/package/@openpalm/channel-api)
            - [@openpalm/channel-discord](https://www.npmjs.com/package/@openpalm/channel-discord)
            - [@openpalm/assistant-tools](https://www.npmjs.com/package/@openpalm/assistant-tools)

            ## Quick Install

            ```bash
            curl -fsSL https://raw.githubusercontent.com/itlackey/openpalm/main/scripts/setup.sh | bash
            ```

            ## What's Changed
          files: |
            dist/openpalm-${{ needs.prepare-tag.outputs.version }}-deploy-bundle.tar.gz
            dist/checksums-sha256.txt
            dist/openpalm-cli-linux-x64
            dist/openpalm-cli-linux-arm64
            dist/openpalm-cli-darwin-x64
            dist/openpalm-cli-darwin-arm64
            dist/openpalm-cli-windows-x64.exe
            dist/openpalm-cli-windows-arm64.exe
