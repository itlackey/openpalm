<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 390" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="13">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#64748b"/>
    </marker>
    <marker id="arr-grn" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#22c55e"/>
    </marker>
    <marker id="arr-blu" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3b82f6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="860" height="390" rx="6" fill="#fafafa"/>

  <!-- Title -->
  <text x="430" y="30" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">How OpenPalm Works</text>

  <!-- ── Network zone backgrounds ── -->

  <!-- channel_lan zone (extends to guardian overlap) -->
  <rect x="135" y="55" width="240" height="225" rx="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="148" y="74" font-size="10" fill="#86efac" font-weight="600">channel_lan</text>

  <!-- assistant_net zone (starts at guardian overlap) -->
  <rect x="350" y="55" width="495" height="225" rx="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="770" y="74" font-size="10" fill="#93c5fd" font-weight="600">assistant_net</text>

  <!-- ── External: Clients ── -->
  <rect x="20" y="148" width="90" height="44" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.2"/>
  <text x="65" y="175" text-anchor="middle" font-size="12" font-weight="600" fill="#334155">Clients</text>

  <!-- ── Channels ── -->
  <rect x="152" y="95" width="146" height="32" rx="7" fill="#dcfce7" stroke="#86efac" stroke-width="1.2"/>
  <text x="225" y="116" text-anchor="middle" font-size="12" font-weight="600" fill="#166534">chat</text>

  <rect x="152" y="135" width="146" height="32" rx="7" fill="#dcfce7" stroke="#86efac" stroke-width="1.2"/>
  <text x="225" y="156" text-anchor="middle" font-size="12" font-weight="600" fill="#166534">api</text>

  <rect x="152" y="175" width="146" height="32" rx="7" fill="#dcfce7" stroke="#86efac" stroke-width="1.2"/>
  <text x="225" y="196" text-anchor="middle" font-size="12" font-weight="600" fill="#166534">discord</text>

  <rect x="152" y="215" width="146" height="32" rx="7" fill="#dcfce7" stroke="#86efac" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="225" y="236" text-anchor="middle" font-size="11" fill="#86efac" font-style="italic">slack, voice, ...</text>

  <!-- ── Guardian (bridges both networks) ── -->
  <rect x="355" y="120" width="130" height="80" rx="10" fill="#fffbeb" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="420" y="150" text-anchor="middle" font-size="14" font-weight="700" fill="#92400e">Guardian</text>
  <text x="420" y="167" text-anchor="middle" font-size="10" fill="#b45309">HMAC · replay</text>
  <text x="420" y="181" text-anchor="middle" font-size="10" fill="#b45309">rate limit</text>

  <!-- ── Assistant ── -->
  <rect x="530" y="108" width="140" height="65" rx="10" fill="#dbeafe" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="600" y="136" text-anchor="middle" font-size="14" font-weight="700" fill="#1e40af">Assistant</text>
  <text x="600" y="153" text-anchor="middle" font-size="10" fill="#3b82f6">OpenCode runtime</text>
  <text x="600" y="166" text-anchor="middle" font-size="9" fill="#60a5fa">no Docker socket</text>

  <!-- ── Memory ── -->
  <rect x="720" y="118" width="110" height="50" rx="10" fill="#dbeafe" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="775" y="141" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">Memory</text>
  <text x="775" y="157" text-anchor="middle" font-size="10" fill="#3b82f6">sqlite-vec</text>

  <!-- ── Scheduler ── -->
  <rect x="530" y="210" width="140" height="45" rx="10" fill="#dbeafe" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="600" y="234" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">Scheduler</text>
  <text x="600" y="248" text-anchor="middle" font-size="10" fill="#3b82f6">cron automations</text>

  <!-- ── Admin (optional) ── -->
  <rect x="720" y="210" width="110" height="50" rx="10" fill="#f5f3ff" stroke="#a78bfa" stroke-width="1.2" stroke-dasharray="5,3"/>
  <text x="775" y="234" text-anchor="middle" font-size="13" font-weight="600" fill="#6d28d9">Admin</text>
  <text x="775" y="248" text-anchor="middle" font-size="10" fill="#8b5cf6" font-style="italic">optional</text>

  <!-- ═══════════════════════════════ -->
  <!-- ARROWS                          -->
  <!-- ═══════════════════════════════ -->

  <!-- Clients → channel area -->
  <line x1="110" y1="170" x2="149" y2="153" stroke="#64748b" stroke-width="1.3" marker-end="url(#arr)"/>

  <!-- Channels → Guardian (HMAC signed) -->
  <path d="M 298 111 Q 320 125, 353 140" fill="none" stroke="#22c55e" stroke-width="1.3" marker-end="url(#arr-grn)"/>
  <line x1="298" y1="151" x2="353" y2="155" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr-grn)"/>
  <path d="M 298 191 Q 320 180, 353 170" fill="none" stroke="#22c55e" stroke-width="1.3" marker-end="url(#arr-grn)"/>
  <text x="302" y="102" font-size="9" fill="#16a34a" font-weight="600">HMAC signed</text>

  <!-- Guardian → Assistant (validated) -->
  <line x1="485" y1="155" x2="528" y2="145" stroke="#3b82f6" stroke-width="1.8" marker-end="url(#arr-blu)"/>
  <text x="488" y="140" font-size="9" fill="#3b82f6" font-weight="600">validated</text>

  <!-- Assistant ↔ Memory -->
  <line x1="670" y1="140" x2="718" y2="143" stroke="#3b82f6" stroke-width="1.3" marker-end="url(#arr-blu)"/>

  <!-- Scheduler → Assistant (cron) -->
  <line x1="600" y1="210" x2="600" y2="175" stroke="#3b82f6" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr-blu)"/>
  <text x="607" y="198" font-size="9" fill="#3b82f6" font-style="italic">cron</text>

  <!-- Admin → Assistant (optional API) -->
  <path d="M 720 230 L 672 160" fill="none" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ═══════════════════════════════ -->
  <!-- LEGEND                          -->
  <!-- ═══════════════════════════════ -->

  <rect x="25" y="305" width="810" height="75" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Row 1: box types -->
  <rect x="40" y="320" width="14" height="10" rx="3" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="60" y="329" font-size="10" fill="#334155">Channel adapter</text>

  <rect x="175" y="320" width="14" height="10" rx="3" fill="#fffbeb" stroke="#fbbf24" stroke-width="1"/>
  <text x="195" y="329" font-size="10" fill="#334155">Security gateway</text>

  <rect x="320" y="320" width="14" height="10" rx="3" fill="#dbeafe" stroke="#60a5fa" stroke-width="1"/>
  <text x="340" y="329" font-size="10" fill="#334155">Core service</text>

  <rect x="435" y="320" width="14" height="10" rx="3" fill="#f5f3ff" stroke="#a78bfa" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="455" y="329" font-size="10" fill="#334155">Optional</text>

  <rect x="530" y="320" width="14" height="10" rx="3" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="550" y="329" font-size="10" fill="#334155">External</text>

  <rect x="635" y="316" width="38" height="16" rx="4" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="680" y="329" font-size="10" fill="#334155">Network zone</text>

  <!-- Row 2: arrow types -->
  <line x1="40" y1="355" x2="65" y2="355" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr-grn)"/>
  <text x="72" y="359" font-size="10" fill="#334155">HMAC-signed message</text>

  <line x1="225" y1="355" x2="250" y2="355" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr-blu)"/>
  <text x="257" y="359" font-size="10" fill="#334155">Validated / internal</text>

  <line x1="395" y1="355" x2="420" y2="355" stroke="#64748b" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <text x="427" y="359" font-size="10" fill="#334155">Optional path</text>
</svg>
