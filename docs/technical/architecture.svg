<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 720" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#22c55e"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#f97316"/>
    </marker>
    <marker id="arrow-purple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#8b5cf6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1020" height="720" rx="8" fill="#fafafa"/>

  <!-- Title -->
  <text x="510" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">OpenPalm Container Topology</text>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- NETWORK BOUNDARIES (dashed rectangles)                        -->
  <!-- ═══════════════════════════════════════════════════════════════ -->

  <!-- channel_public network -->
  <rect x="30" y="155" width="280" height="230" rx="10" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="7,4"/>
  <text x="45" y="177" font-size="11" fill="#ef4444" font-weight="600">channel_public</text>

  <!-- channel_lan network -->
  <rect x="20" y="145" width="450" height="250" rx="12" fill="none" stroke="#f97316" stroke-width="1.5" stroke-dasharray="7,4"/>
  <text x="320" y="167" font-size="11" fill="#f97316" font-weight="600">channel_lan</text>

  <!-- assistant_net network -->
  <rect x="340" y="100" width="660" height="400" rx="12" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="7,4"/>
  <text x="830" y="122" font-size="11" fill="#3b82f6" font-weight="600">assistant_net</text>

  <!-- admin_docker_net network -->
  <rect x="530" y="420" width="460" height="110" rx="10" fill="none" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="7,4"/>
  <text x="545" y="442" font-size="11" fill="#8b5cf6" font-weight="600">admin_docker_net</text>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- EXTERNAL ACTORS                                                -->
  <!-- ═══════════════════════════════════════════════════════════════ -->

  <!-- Operator browser -->
  <rect x="530" y="52" width="150" height="40" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.2"/>
  <text x="605" y="77" text-anchor="middle" font-size="12" fill="#334155" font-weight="600">Operator Browser</text>

  <!-- External clients -->
  <rect x="60" y="52" width="180" height="40" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.2"/>
  <text x="150" y="77" text-anchor="middle" font-size="12" fill="#334155" font-weight="600">External Clients</text>

  <!-- CLI (host) -->
  <rect x="760" y="52" width="120" height="40" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.2"/>
  <text x="820" y="77" text-anchor="middle" font-size="12" fill="#334155" font-weight="600">CLI (host)</text>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- CONTAINERS                                                     -->
  <!-- ═══════════════════════════════════════════════════════════════ -->

  <!-- Channel: Chat (green) -->
  <rect x="50" y="200" width="145" height="50" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="122" y="223" text-anchor="middle" font-size="13" font-weight="600" fill="#166534">channel-chat</text>
  <text x="122" y="239" text-anchor="middle" font-size="10" fill="#22c55e">:8181</text>

  <!-- Channel: API (green) -->
  <rect x="50" y="265" width="145" height="50" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="122" y="288" text-anchor="middle" font-size="13" font-weight="600" fill="#166534">channel-api</text>
  <text x="122" y="304" text-anchor="middle" font-size="10" fill="#22c55e">:8282</text>

  <!-- Channel: Discord (green) -->
  <rect x="50" y="330" width="145" height="50" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="122" y="353" text-anchor="middle" font-size="13" font-weight="600" fill="#166534">channel-discord</text>
  <text x="122" y="369" text-anchor="middle" font-size="10" fill="#22c55e">:8383</text>

  <!-- More channels placeholder -->
  <rect x="215" y="265" width="100" height="50" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="265" y="294" text-anchor="middle" font-size="11" fill="#22c55e" font-style="italic">more...</text>

  <!-- Guardian (core / blue) -->
  <rect x="370" y="220" width="160" height="70" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="450" y="246" text-anchor="middle" font-size="14" font-weight="700" fill="#1e40af">Guardian</text>
  <text x="450" y="263" text-anchor="middle" font-size="10" fill="#3b82f6">HMAC verify :8080</text>
  <text x="450" y="279" text-anchor="middle" font-size="10" fill="#3b82f6">replay + rate limit</text>

  <!-- Assistant (core / blue) -->
  <rect x="620" y="200" width="180" height="70" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="710" y="226" text-anchor="middle" font-size="14" font-weight="700" fill="#1e40af">Assistant</text>
  <text x="710" y="243" text-anchor="middle" font-size="10" fill="#3b82f6">OpenCode :4096</text>
  <text x="710" y="259" text-anchor="middle" font-size="10" fill="#3b82f6">no Docker socket</text>

  <!-- Memory (core / blue) -->
  <rect x="840" y="200" width="140" height="56" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="910" y="224" text-anchor="middle" font-size="14" font-weight="700" fill="#1e40af">Memory</text>
  <text x="910" y="242" text-anchor="middle" font-size="10" fill="#3b82f6">sqlite-vec :8765</text>

  <!-- Scheduler (core / blue) -->
  <rect x="840" y="290" width="140" height="70" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="910" y="316" text-anchor="middle" font-size="14" font-weight="700" fill="#1e40af">Scheduler</text>
  <text x="910" y="333" text-anchor="middle" font-size="10" fill="#3b82f6">cron engine :8090</text>
  <text x="910" y="349" text-anchor="middle" font-size="10" fill="#3b82f6">no Docker socket</text>

  <!-- Admin (optional / blue, dashed border to indicate optional) -->
  <rect x="550" y="340" width="180" height="70" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="640" y="366" text-anchor="middle" font-size="14" font-weight="700" fill="#1e40af">Admin</text>
  <text x="640" y="383" text-anchor="middle" font-size="10" fill="#3b82f6">SvelteKit :8100</text>
  <text x="640" y="399" text-anchor="middle" font-size="10" fill="#9ca3af" font-style="italic">optional (profile)</text>

  <!-- Docker Socket Proxy (infrastructure / gray) -->
  <rect x="800" y="450" width="175" height="65" rx="10" fill="#f3f4f6" stroke="#6b7280" stroke-width="1.5"/>
  <text x="887" y="474" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">Docker Socket</text>
  <text x="887" y="490" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">Proxy</text>
  <text x="887" y="506" text-anchor="middle" font-size="10" fill="#6b7280">filtered :2375</text>

  <!-- Docker Daemon (external) -->
  <rect x="810" y="560" width="155" height="42" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.2"/>
  <text x="887" y="585" text-anchor="middle" font-size="12" fill="#334155" font-weight="600">Docker Daemon</text>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- MESSAGE FLOW ARROWS                                            -->
  <!-- ═══════════════════════════════════════════════════════════════ -->

  <!-- External clients -> channel-chat (direct) -->
  <line x1="120" y1="92" x2="115" y2="197" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- External clients -> channel-api -->
  <line x1="155" y1="92" x2="130" y2="262" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- External clients -> channel-discord (via internet) -->
  <line x1="180" y1="92" x2="130" y2="327" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Operator browser -> Admin (direct) -->
  <path d="M 605 92 L 640 337" fill="none" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="610" y="215" font-size="10" fill="#3b82f6" font-style="italic">:3880</text>

  <!-- CLI -> Docker Compose (manages stack lifecycle) -->
  <path d="M 820 92 L 887 447" fill="none" stroke="#6b7280" stroke-width="1.3" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text x="860" y="200" font-size="10" fill="#6b7280" font-style="italic" transform="rotate(80, 860, 200)">compose</text>

  <!-- channel-chat -> Guardian (HMAC signed) -->
  <path d="M 195 218 L 367 245" fill="none" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="260" y="218" font-size="10" fill="#22c55e" font-weight="600">HMAC signed</text>

  <!-- channel-api -> Guardian -->
  <path d="M 195 285 L 370 262" fill="none" stroke="#22c55e" stroke-width="1.3" marker-end="url(#arrow-green)"/>

  <!-- channel-discord -> Guardian -->
  <path d="M 195 348 Q 300 320, 375 280" fill="none" stroke="#22c55e" stroke-width="1.3" marker-end="url(#arrow-green)"/>

  <!-- Guardian -> Assistant (validated message) -->
  <line x1="530" y1="252" x2="617" y2="240" stroke="#3b82f6" stroke-width="1.8" marker-end="url(#arrow-blue)"/>
  <text x="555" y="235" font-size="10" fill="#3b82f6" font-weight="600">validated</text>

  <!-- Assistant -> Memory -->
  <line x1="800" y1="225" x2="838" y2="225" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- Scheduler -> Assistant (cron jobs) -->
  <path d="M 840 320 L 800 260" fill="none" stroke="#3b82f6" stroke-width="1.3" stroke-dasharray="5,3" marker-end="url(#arrow-blue)"/>
  <text x="830" y="280" font-size="10" fill="#3b82f6" font-style="italic">cron</text>

  <!-- Scheduler -> Memory -->
  <line x1="910" y1="290" x2="910" y2="258" stroke="#3b82f6" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrow-blue)"/>

  <!-- Assistant -> Admin API (stack ops, dashed = optional) -->
  <path d="M 680 270 L 660 337" fill="none" stroke="#3b82f6" stroke-width="1.3" stroke-dasharray="5,3" marker-end="url(#arrow-blue)"/>
  <text x="685" y="310" font-size="10" fill="#3b82f6" font-style="italic">API calls</text>

  <!-- Admin -> Docker Socket Proxy -->
  <path d="M 730 390 L 798 470" fill="none" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
  <text x="740" y="440" font-size="10" fill="#8b5cf6" font-style="italic">DOCKER_HOST</text>

  <!-- Docker Socket Proxy -> Docker Daemon -->
  <line x1="887" y1="515" x2="887" y2="557" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="905" y="542" font-size="10" fill="#6b7280" font-style="italic">/var/run/docker.sock</text>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- LEGEND                                                         -->
  <!-- ═══════════════════════════════════════════════════════════════ -->

  <rect x="30" y="630" width="620" height="80" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Core services -->
  <rect x="45" y="645" width="16" height="12" rx="3" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="67" y="656" font-size="11" fill="#334155">Core service</text>

  <!-- Channel adapters -->
  <rect x="165" y="645" width="16" height="12" rx="3" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="187" y="656" font-size="11" fill="#334155">Channel adapter</text>

  <!-- Optional service -->
  <rect x="305" y="645" width="16" height="12" rx="3" fill="#dbeafe" stroke="#3b82f6" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="327" y="656" font-size="11" fill="#334155">Optional service</text>

  <!-- Infrastructure -->
  <rect x="445" y="645" width="16" height="12" rx="3" fill="#f3f4f6" stroke="#6b7280" stroke-width="1"/>
  <text x="467" y="656" font-size="11" fill="#334155">Infrastructure</text>

  <!-- External -->
  <rect x="555" y="645" width="16" height="12" rx="3" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
  <text x="577" y="656" font-size="11" fill="#334155">External</text>

  <!-- Network boundary -->
  <line x1="45" y1="685" x2="80" y2="685" stroke="#555" stroke-width="1.2" stroke-dasharray="6,3"/>
  <text x="86" y="689" font-size="11" fill="#334155">Network boundary</text>

  <!-- Message flow -->
  <line x1="210" y1="685" x2="240" y2="685" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="247" y="689" font-size="11" fill="#334155">Message flow</text>

  <!-- Internal API call -->
  <line x1="345" y1="685" x2="375" y2="685" stroke="#555" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text x="382" y="689" font-size="11" fill="#334155">Internal API call</text>

  <!-- HMAC signed -->
  <line x1="500" y1="685" x2="530" y2="685" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="537" y="689" font-size="11" fill="#334155">HMAC signed</text>
</svg>
